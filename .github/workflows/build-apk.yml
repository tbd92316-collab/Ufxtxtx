name: Build FastChat Pro Messaging & Calling App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure
      run: |
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/res/drawable/
        mkdir -p app/src/main/java/com/fastchat/pro/

    - name: 🔑 Inject Firebase Official Credentials & Colors
      run: |
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">FastChat Pro</string>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/colors.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="bg_dark">#0B111E</color>
            <color name="surface_dark">#161F30</color>
            <color name="accent_green">#00FFCC</color>
            <color name="text_white">#FFFFFF</color>
            <color name="text_gray">#94A3B8</color>
            <color name="link_blue">#2563EB</color>
            <color name="call_red">#EF4444</color>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.FastChat" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                <item name="colorPrimary">@color/accent_green</item>
                <item name="android:windowBackground">@color/bg_dark</item>
            </style>
        </resources>
        EOF

        # Verified Production Firebase Real-time configurations injected from api.txt
        cat << 'EOF' > app/src/main/java/com/fastchat/pro/FirebaseConfig.java
        package com.fastchat.pro;

        public class FirebaseConfig {
            public static final String API_KEY = "AIzaSyAOsGkBI2QDkZAuogCEWsX2Eu3Q2jJYeCE";
            public static final String AUTH_DOMAIN = "movi-hub.firebaseapp.com";
            public static final String DATABASE_URL = "https://movi-hub-default-rtdb.firebaseio.com";
            public static final String PROJECT_ID = "movi-hub";
            public static final String STORAGE_BUCKET = "movi-hub.firebasestorage.app";
            public static final String MESSAGING_SENDER_ID = "15875013349";
            public static final String APP_ID = "1:15875013349:web:ab65915c3bd575772ab20c";
        }
        EOF

    - name: 🎨 Create Authentication UI Layouts
      run: |
        cat << 'EOF' > app/src/main/res/layout/activity_login.xml
