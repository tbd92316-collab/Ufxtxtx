name: Build Premium Blue File Manager

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure & Configuration
      run: |
        mkdir -p app/src/main/java/com/fastchat/filemanager/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/res/drawable/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':app'
        EOF

        # 3. Root build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        EOF

        # 4. Android Manifest with Storage Permissions
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.fastchat.filemanager">
            
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />

            <application 
                android:label="SkyFiles Pro" 
                android:theme="@style/Theme.FileManager"
                android:requestLegacyExternalStorage="true">
                
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

            </application>
        </manifest>
        EOF

        # 5. UI Custom Shapes (Round Cards for Blue/White theme)
        cat << 'EOF' > app/src/main/res/drawable/card_bg.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFFFFF"/>
            <corners android:radius="16dp"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/progress_bg.xml
        <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
            <item android:id="@android:id/background">
                <shape><corners android:radius="5dp"/><solid android:color="#E0E0E0"/></shape>
            </item>
            <item android:id="@android:id/progress">
                <clip>
                    <shape><corners android:radius="5dp"/><solid android:color="#0D47A1"/></shape>
                </clip>
            </item>
        </layer-list>
        EOF

        # 6. Premium Blue/White UI Layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:background="#F4F6F9">

            <LinearLayout android:layout_width="match_parent" android:layout_height="180dp"
                android:background="#0D47A1" android:orientation="vertical" android:padding="20dp">
                
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                    android:text="SkyFiles Pro" android:textColor="#FFFFFF" android:textSize="24sp" android:textStyle="bold"/>
                
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                    android:text="Storage Dashboard" android:textColor="#BBDEFB" android:textSize="14sp" android:layout_marginTop="4dp"/>

                <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:orientation="vertical" android:background="@drawable/card_bg" android:layout_marginTop="20dp" android:padding="15dp">
                    
                    <RelativeLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                        <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                            android:text="Internal Storage" android:textColor="#0D47A1" android:textStyle="bold" android:textSize="14sp"/>
                        <TextView android:id="@+id/tv_storage_ratio" android:layout_width="wrap_content" android:layout_height="wrap_content"
                            android:layout_alignParentRight="true" android:text="75% Used" android:textColor="#555555" android:textSize="12sp"/>
                    </RelativeLayout>

                    <ProgressBar android:id="@+id/storage_progress" style="?android:attr/progressBarStyleHorizontal"
                        android:layout_width="match_parent" android:layout_height="8dp" android:layout_marginTop="10dp"
                        android:progress="75" android:progressDrawable="@drawable/progress_bg"/>
                </LinearLayout>
            </LinearLayout>

            <GridLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:columnCount="2" android:rowCount="2" android:padding="15dp" android:alignmentMode="alignMargins">
                
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1"
                    android:orientation="vertical" android:background="@drawable/card_bg" android:padding="15dp" android:layout_margin="6dp" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🖼️ Images" android:textColor="#0D47A1" android:textStyle="bold"/>
                </LinearLayout>

                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1"
                    android:orientation="vertical" android:background="@drawable/card_bg" android:padding="15dp" android:layout_margin="6dp" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🎬 Videos" android:textColor="#0D47A1" android:textStyle="bold"/>
                </LinearLayout>

                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1"
                    android:orientation="vertical" android:background="@drawable/card_bg" android:padding="15dp" android:layout_margin="6dp" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🎵 Audio" android:textColor="#0D47A1" android:textStyle="bold"/>
                </LinearLayout>

                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_columnWeight="1"
                    android:orientation="vertical" android:background="@drawable/card_bg" android:padding="15dp" android:layout_margin="6dp" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="📥 Downloads" android:textColor="#0D47A1" android:textStyle="bold"/>
                </LinearLayout>
            </GridLayout>

            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Files &amp; Folders" android:textColor="#333333" android:textSize="16sp" android:textStyle="bold" android:layout_marginLeft="20dp" android:layout_marginBottom="5dp"/>

            <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_files"
                android:layout_width="match_parent" android:layout_height="match_parent" android:padding="10dp"/>

        </LinearLayout>
        EOF

        # 7. MainActivity Java Implementation
        cat << 'EOF' > app/src/main/java/com/fastchat/filemanager/MainActivity.java
        package com.fastchat.filemanager;

        import android.Manifest;
        import android.content.pm.PackageManager;
        import android.os.Build;
        import android.os.Bundle;
        import android.os.Environment;
        import android.os.StatFs;
        import android.widget.ProgressBar;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.annotation.NonNull;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;
        import java.io.File;

        public class MainActivity extends AppCompatActivity {
            private static final int PERMISSION_REQ_CODE = 500;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                checkPermissions();
                updateStorageDashboard();
            }

            private void checkPermissions() {
                if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{
                            Manifest.permission.READ_EXTERNAL_STORAGE, 
                            Manifest.permission.WRITE_EXTERNAL_STORAGE
                    }, PERMISSION_REQ_CODE);
                }
            }

            private void updateStorageDashboard() {
                File path = Environment.getExternalStorageDirectory();
                StatFs stat = new StatFs(path.getPath());
                long blockSize = stat.getBlockSizeLong();
                long totalBlocks = stat.getBlockCountLong();
                long availableBlocks = stat.getAvailableBlocksLong();

                long totalBytes = totalBlocks * blockSize;
                long availableBytes = availableBlocks * blockSize;
                long usedBytes = totalBytes - availableBytes;

                int totalGB = (int) (totalBytes / (1024 * 1024 * 1024));
                int usedGB = (int) (usedBytes / (1024 * 1024 * 1024));
                
                int progressPercent = (totalGB > 0) ? (usedGB * 100 / totalGB) : 0;

                ProgressBar pb = findViewById(R.id.storage_progress);
                TextView tvRatio = findViewById(R.id.tv_storage_ratio);

                if (pb != null) pb.setProgress(progressPercent);
                if (tvRatio != null) tvRatio.setText(usedGB + " GB / " + totalGB + " GB (" + progressPercent + "%)");
            }

            @Override
            public void onRequestPermissionsResult(int requestCode, @NonNull String[] permissions, @NonNull int[] grantResults) {
                super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                if (requestCode == PERMISSION_REQ_CODE && grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                    updateStorageDashboard();
                } else {
                    Toast.makeText(this, "Storage Permission Required!", Toast.LENGTH_SHORT).show();
                }
            }
        }
        EOF

        # 8. Premium Blue Colors & Material Styles configuration
        cat << 'EOF' > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.FileManager" parent="Theme.MaterialComponents.Light.NoActionBar">
                <item name="colorPrimary">#0D47A1</item>
                <item name="colorPrimaryDark">#0A3982</item>
                <item name="colorAccent">#0D47A1</item>
            </style>
        </resources>
        EOF

        # 9. App build.gradle setup
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.fastchat.filemanager'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.filemanager'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
        }
        EOF

    - name: 🏗️ Build Premium File Manager APK
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: SkyFiles-Pro-Manager
        path: app/build/outputs/apk/debug/app-debug.apk
