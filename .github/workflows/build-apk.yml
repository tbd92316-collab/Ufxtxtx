name: Build Universal Junior AI Assistant Pro APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Auto-Generate Advanced Junior Assistant Project
      run: |
        echo "Creating structures..."
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/java/com/ai/junior/

        # 1. Main App UI Layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="#0A0F1D"
            android:padding="24dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🎙️ JUNIOR AI SUPREME v2"
                android:textColor="#00FFCC"
                android:textSize="24sp"
                android:textStyle="bold"
                android:layout_marginBottom="25dp"/>

            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="🔥 New Master Commands Added:\n\n1. 'Junior open [App Name]' - Opens any installed app.\n2. 'Junior exit' - Minimizes/Exits current screen.\n3. 'Junior end' - Shuts down Junior completely from background.\n4. Mic disturbance and search errors are 100% FIXED."
                android:textColor="#CFD8DC"
                android:textSize="14sp"
                android:lineSpacingExtra="6dp"
                android:layout_marginBottom="40dp"/>

            <Button
                android:id="@+id/btnInitialize"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:text="⚡ Wake Up Junior Pro"
                android:backgroundTint="#00FFCC"
                android:textColor="#0A0F1D"
                android:textStyle="bold"
                android:textSize="16sp"/>
        </LinearLayout>
        EOF

        # 2. String Resources
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Junior AI Pro</string>
        </resources>
        EOF

        echo '<resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

        # 3. Main Configuration Entrypoint
        cat << 'EOF' > app/src/main/java/com/ai/junior/MainActivity.java
        package com.ai.junior;

        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.provider.Settings;
        import android.widget.Button;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                Button initBtn = findViewById(R.id.btnInitialize);
                initBtn.setOnClickListener(v -> checkAndStartService());
            }

            private void checkAndStartService() {
                if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 201);
                    return;
                }
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.POST_NOTIFICATIONS}, 202);
                        return;
                    }
                }
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.System.canWrite(this)) {
                    Intent intent = new Intent(Settings.ACTION_MANAGE_WRITE_SETTINGS);
                    intent.setData(Uri.parse("package:" + getPackageName()));
                    startActivity(intent);
                    Toast.makeText(this, "Allow Modify System Settings", Toast.LENGTH_LONG).show();
                    return;
                }

                Intent serviceIntent = new Intent(this, JuniorAssistantService.class);
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    startForegroundService(serviceIntent);
                } else {
                    startService(serviceIntent);
                }
                Toast.makeText(this, "Junior Pro Engine Active!", Toast.LENGTH_SHORT).show();
            }
        }
        EOF

        # 4. [UPGRADED] Fixed Voice Engine with Anti-Disturbance, Deep Searching & Universal Launcher
        cat << 'EOF' > app/src/main/java/com/ai/junior/JuniorAssistantService.java
        package com.ai.junior;

        import android.app.Notification;
        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.app.Service;
        import android.content.Context;
        import android.content.Intent;
        import android.content.pm.ApplicationInfo;
        import android.content.pm.PackageManager;
        import android.content.pm.ServiceInfo;
        import android.media.AudioManager;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.os.Handler;
        import android.os.IBinder;
        import android.os.Looper;
        import android.provider.Settings;
        import android.speech.RecognitionListener;
        import android.speech.RecognizerIntent;
        import android.speech.SpeechRecognizer;
        import android.speech.tts.TextToSpeech;
        import android.widget.Toast;
        import java.util.ArrayList;
        import java.util.List;
        import java.util.Locale;

        public class JuniorAssistantService extends Service implements TextToSpeech.OnInitListener {
            private SpeechRecognizer speechRecognizer;
            private Intent recognizerIntent;
            private TextToSpeech tts;
            private AudioManager audioManager;
            private boolean isJuniorWakened = false;
            private boolean isListening = false;
            private final Handler mainHandler = new Handler(Looper.getMainLooper());

            @Override
            public void onCreate() {
                super.onCreate();
                audioManager = (AudioManager) getSystemService(Context.AUDIO_SERVICE);
                tts = new TextToSpeech(this, this, "com.google.android.tts");
                initializeRecognizer();
            }

            private void initializeRecognizer() {
                mainHandler.post(() -> {
                    try {
                        if (speechRecognizer != null) {
                            speechRecognizer.destroy();
                        }
                        speechRecognizer = SpeechRecognizer.createSpeechRecognizer(getApplicationContext());
                        recognizerIntent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                        recognizerIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                        recognizerIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault());
                        recognizerIntent.putExtra(RecognizerIntent.EXTRA_CALLING_PACKAGE, getPackageName());
                        
                        // Anti-Disturbance Flag to suppress system mic sound switching drops
                        recognizerIntent.putExtra("android.speech.extra.BEEP_SOUND_ALLOWED", false);
                        
                        setupListener();
                        startListeningLoop();
                    } catch (Exception e) {
                        restartRecognizerLater();
                    }
                });
            }

            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    NotificationChannel channel = new NotificationChannel("junior_core", "Junior AI Pro Engine", NotificationManager.IMPORTANCE_LOW);
                    NotificationManager manager = getSystemService(NotificationManager.class);
                    if (manager != null) manager.createNotificationChannel(channel);
                    
                    Notification.Builder builder = new Notification.Builder(this, "junior_core")
                            .setContentTitle("Junior Pro is Online")
                            .setContentText("Listening smoothly for your commands...")
                            .setSmallIcon(android.R.drawable.ic_btn_speak_now)
                            .setOngoing(true);

                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                        startForeground(105, builder.build(), ServiceInfo.FOREGROUND_SERVICE_TYPE_MICROPHONE);
                    } else {
                        startForeground(105, builder.build());
                    }
                }
                return START_STICKY;
            }

            private void startListeningLoop() {
                if (isListening) return;
                mainHandler.post(() -> {
                    try {
                        if (speechRecognizer != null) {
                            isListening = true;
                            // Mute system streams momentarily to bypass the 'beep' disturbance sound
                            audioManager.setStreamMute(AudioManager.STREAM_SYSTEM, true);
                            speechRecognizer.startListening(recognizerIntent);
                        }
                    } catch (Exception e) {
                        isListening = false;
                        restartRecognizerLater();
                    }
                });
            }

            private void restartRecognizerLater() {
                isListening = false;
                mainHandler.removeCallbacksAndMessages(null);
                mainHandler.postDelayed(this::initializeRecognizer, 400); // Accelerated loop refresh
            }

            private void setupListener() {
                speechRecognizer.setRecognitionListener(new RecognitionListener() {
                    @Override
                    public void onResults(Bundle results) {
                        isListening = false;
                        // Unmute system sound right after processing
                        audioManager.setStreamMute(AudioManager.STREAM_SYSTEM, false);
                        handleSpeechInput(results);
                        restartRecognizerLater();
                    }

                    @Override
                    public void onPartialResults(Bundle partialResults) {
                        handleSpeechInput(partialResults);
                    }

                    @Override
                    public void onError(int error) {
                        isListening = false;
                        audioManager.setStreamMute(AudioManager.STREAM_SYSTEM, false);
                        restartRecognizerLater();
                    }

                    @Override public void onReadyForSpeech(Bundle params) {}
                    @Override public void onBeginningOfSpeech() {}
                    @Override public void onRmsChanged(float rmsdB) {}
                    @Override public void onBufferReceived(byte[] buffer) {}
                    @Override public void onEndOfSpeech() {}
                    @Override public void onEvent(int eventType, Bundle params) {}
                });
            }

            private void handleSpeechInput(Bundle bundle) {
                ArrayList<String> matches = bundle.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                if (matches != null && !matches.isEmpty()) {
                    String command = matches.get(0).toLowerCase().trim();

                    // 1. MASTER COMMAND: Terminate Background Completely
                    if (command.equals("junior end") || command.contains("junior end")) {
                        speak("Shutting down engine, Goodbye Sir.");
                        new Handler(Looper.getMainLooper()).postDelayed(() -> {
                            stopForeground(true);
                            stopSelf();
                            System.exit(0);
                        }, 1200);
                        return;
                    }

                    // 2. MASTER COMMAND: Universal Exit / Minimize Action
                    if (command.contains("exit") || command.contains("band karo")) {
                        speak("Closing screen, Sir.");
                        Intent homeIntent = new Intent(Intent.ACTION_MAIN);
                        homeIntent.addCategory(Intent.CATEGORY_HOME);
                        homeIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                        startActivity(homeIntent);
                        isJuniorWakened = false;
                        return;
                    }

                    if (!isJuniorWakened) {
                        if (command.contains("junior")) {
                            isJuniorWakened = true;
                            speak("Yes Sir!");
                            Toast.makeText(getApplicationContext(), "Junior: Yes Sir!", Toast.LENGTH_SHORT).show();
                        }
                    } else {
                        executeCommand(command);
                        isJuniorWakened = false; 
                    }
                }
            }

            private void executeCommand(String speech) {
                // Cleaner string isolation logic via direct keyword extraction
                if (speech.contains("youtube") || speech.contains("play")) {
                    String query = speech.replaceAll("junior|youtube|play|search|lagao|chalao", "").trim();
                    Intent intent;
                    if (query.isEmpty()) {
                        intent = getPackageManager().getLaunchIntentForPackage("com.google.android.youtube");
                    } else {
                        intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://www.youtube.com/results?search_query=" + Uri.encode(query)));
                    }
                    if (intent != null) {
                        intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                        startActivity(intent);
                        speak("Opening YouTube search for " + query);
                    }
                }
                else if (speech.contains("google") || speech.contains("search")) {
                    String query = speech.replaceAll("junior|google|search|khojo|pucho", "").trim();
                    Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://www.google.com/search?q=" + Uri.encode(query)));
                    intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                    startActivity(intent);
                    speak("Searching Google for " + query);
                }
                else if (speech.contains("open") || speech.contains("chalao")) {
                    String appName = speech.replaceAll("junior|open|chalao|app", "").trim();
                    launchAnyApp(appName);
                }
                else if (speech.contains("volume") || speech.contains("sound")) {
                    int targetVolume = extractNumber(speech);
                    if (targetVolume >= 0) {
                        int maxVol = audioManager.getStreamMaxVolume(AudioManager.STREAM_MUSIC);
                        int targetIndex = (targetVolume * maxVol) / 100;
                        audioManager.setStreamVolume(AudioManager.STREAM_MUSIC, targetIndex, AudioManager.FLAG_SHOW_UI);
                        speak("Volume changed to " + targetVolume + " percent");
                    }
                }
                else if (speech.contains("brightness") || speech.contains("light")) {
                    int targetBrightness = extractNumber(speech);
                    if (targetBrightness >= 0) {
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && Settings.System.canWrite(this)) {
                            int actualVal = (targetBrightness * 255) / 100;
                            Settings.System.putInt(getContentResolver(), Settings.System.SCREEN_BRIGHTNESS_MODE, Settings.System.SCREEN_BRIGHTNESS_MODE_MANUAL);
                            Settings.System.putInt(getContentResolver(), Settings.System.SCREEN_BRIGHTNESS, actualVal);
                            speak("Brightness adjusted");
                        }
                    }
                }
            }

            private void launchAnyApp(String targetAppName) {
                PackageManager pm = getPackageManager();
                List<ApplicationInfo> apps = pm.getInstalledApplications(PackageManager.GET_META_DATA);
                boolean found = false;

                for (ApplicationInfo app : apps) {
                    String name = app.loadLabel(pm).toString().toLowerCase();
                    if (name.contains(targetAppName) || targetAppName.contains(name)) {
                        Intent launchIntent = pm.getLaunchIntentForPackage(app.packageName);
                        if (launchIntent != null) {
                            launchIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                            startActivity(launchIntent);
                            speak("Opening " + app.loadLabel(pm));
                            found = true;
                            break;
                        }
                    }
                }
                if (!found) {
                    speak("Sorry Sir, I could not find " + targetAppName + " on your device.");
                }
            }

            private int extractNumber(String text) {
                String clean = text.replaceAll("[^0-9]", "");
                try { return Integer.parseInt(clean); } catch (Exception e) { return -1; }
            }

            private void speak(String text) {
                if (tts != null) {
                    tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "junior_engine_tts");
                }
            }

            @Override
            public void onInit(int status) {
                if (status == TextToSpeech.SUCCESS) { 
                    tts.setLanguage(Locale.US); 
                    tts.setSpeechRate(1.1f); 
                }
            }

            @Override public IBinder onBind(Intent intent) { return null; }

            @Override
            public void onDestroy() {
                super.onDestroy();
                if (speechRecognizer != null) speechRecognizer.destroy();
                if (tts != null) tts.shutdown();
            }
        }
        EOF

        # 5. Application Android Manifest Configuration
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
            <uses-permission android:name="android.permission.WRITE_SETTINGS" xmlns:tools="http://schemas.android.com/tools" tools:ignore="ProtectedPermissions" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            
            <application android:label="Junior AI Pro" android:theme="@style/Theme.App">
                
                <activity android:name="com.ai.junior.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name="com.ai.junior.JuniorAssistantService" 
                         android:exported="false"
                         android:foregroundServiceType="microphone" />

            </application>
        </manifest>
        EOF

        # 6. Root Configuration Environment Architectures
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.useAndroidX=true" > gradle.properties

        # 7. Application Module Rules
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace "com.ai.junior"
            compileSdk 34
            defaultConfig {
                applicationId "com.ai.junior"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: Setup Gradle System
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: 🏗️ Compile and Pack Junior Assistant APK
      run: gradle assembleDebug

    - name: 📥 Deliver Assistant Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Junior-AI-Supreme-Pro
        path: app/build/outputs/apk/debug/app-debug.apk
