name: Build Full UI Keyboard App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Filesystem & Full UI
      run: |
        mkdir -p app/src/main/java/com/fastchat/keyboard/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/xml/

        # 1. Settings.gradle (Root)
        echo "include ':app'" > settings.gradle

        # 2. Main Manifest
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.fastchat.keyboard">
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <application android:label="Premium Image Keyboard">
                <service android:name=".ImageKeyboardService" android:permission="android.permission.BIND_INPUT_METHOD" android:exported="true">
                    <intent-filter>
                        <action android:name="android.view.InputMethod" />
                    </intent-filter>
                    <meta-data android:name="android.view.im" android:resource="@xml/method" />
                </service>
            </application>
        </manifest>
        EOF

        # 3. Keyboard Logic with Typing Support
        cat << 'EOF' > app/src/main/java/com/fastchat/keyboard/ImageKeyboardService.java
        package com.fastchat.keyboard;
        import android.inputmethodservice.InputMethodService;
        import android.view.View;
        import android.view.inputmethod.InputConnection;
        import android.widget.Button;
        import android.widget.LinearLayout;

        public class ImageKeyboardService extends InputMethodService {
            @Override public View onCreateInputView() {
                View view = getLayoutInflater().inflate(R.layout.keyboard_view, null);
                
                // Typing logic for buttons
                setupKey(view, R.id.key_q, "q"); setupKey(view, R.id.key_w, "w");
                setupKey(view, R.id.key_e, "e"); setupKey(view, R.id.key_r, "r");
                setupKey(view, R.id.key_t, "t"); setupKey(view, R.id.key_y, "y");
                setupKey(view, R.id.key_u, "u"); setupKey(view, R.id.key_i, "i");
                setupKey(view, R.id.key_o, "o"); setupKey(view, R.id.key_p, "p");
                setupKey(view, R.id.key_space, " ");

                // Delete Button Logic
                Button del = view.findViewById(R.id.key_delete);
                if(del != null) {
                    del.setOnClickListener(v -> {
                        InputConnection ic = getCurrentInputConnection();
                        if (ic != null) ic.deleteSurroundingText(1, 0);
                    });
                }

                // Image Selection Button
                Button btnImage = view.findViewById(R.id.btn_select_image);
                if(btnImage != null) {
                    btnImage.setOnClickListener(v -> {
                        // Storage se photo select karne ka feature triggers yahan se hoga
                    });
                }

                return view;
            }

            private void setupKey(View view, int id, String text) {
                Button btn = view.findViewById(id);
                if (btn != null) {
                    btn.setOnClickListener(v -> {
                        InputConnection ic = getCurrentInputConnection();
                        if (ic != null) ic.commitText(text, 1);
                    });
                }
            }
        }
        EOF

        # 4. Premium Keyboard UI Layout (Row by Row Typing UI)
        cat << 'EOF' > app/src/main/res/layout/keyboard_view.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="wrap_content"
            android:orientation="vertical" android:background="#1E1E1E" android:padding="5dp">
            
            <!-- Top Action Bar for Image Feature -->
            <LinearLayout android:layout_width="match_parent" android:layout_height="45dp" android:orientation="horizontal" android:gravity="center">
                <Button android:id="@+id/btn_select_image" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🖼️ INSERT IMAGE AS TEXT" android:textSize="12sp" android:backgroundTint="#00E676" android:textColor="#000000"/>
            </LinearLayout>

            <!-- Row 1: QWERTY -->
            <LinearLayout android:layout_width="match_parent" android:layout_height="50dp" android:orientation="horizontal">
                <Button android:id="@+id/key_q" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="Q" android:textSize="14sp"/>
                <Button android:id="@+id/key_w" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="W" android:textSize="14sp"/>
                <Button android:id="@+id/key_e" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="E" android:textSize="14sp"/>
                <Button android:id="@+id/key_r" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="R" android:textSize="14sp"/>
                <Button android:id="@+id/key_t" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="T" android:textSize="14sp"/>
                <Button android:id="@+id/key_y" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="Y" android:textSize="14sp"/>
                <Button android:id="@+id/key_u" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="U" android:textSize="14sp"/>
                <Button android:id="@+id/key_i" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="I" android:textSize="14sp"/>
                <Button android:id="@+id/key_o" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="O" android:textSize="14sp"/>
                <Button android:id="@+id/key_p" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="P" android:textSize="14sp"/>
            </LinearLayout>

            <!-- Row 2: Bottom Operations -->
            <LinearLayout android:layout_width="match_parent" android:layout_height="50dp" android:orientation="horizontal" android:layout_marginTop="5dp">
                <Button android:id="@+id/key_space" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="3" android:text="SPACE" android:textSize="14sp"/>
                <Button android:id="@+id/key_delete" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="⌫" android:textSize="16sp" android:backgroundTint="#D32F2F"/>
            </LinearLayout>
        </LinearLayout>
        EOF

        echo '<input-method xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/method.xml

        # 5. Build Gradle
        echo "plugins { id 'com.android.application' }
        android { namespace 'com.fastchat.keyboard'; compileSdk 34; defaultConfig { applicationId 'com.fastchat.keyboard'; minSdk 24; targetSdk 34 } }" > app/build.gradle

    - name: 🏗️ Build Full Setup APK
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Real-UI-Image-Keyboard
        path: app/build/outputs/apk/debug/app-debug.apk
