name: Build Flashlight Controller App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure & Code Base
      run: |
        mkdir -p app/src/main/java/com/fastchat/flashlight/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/res/drawable/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        include ':app'
        EOF

        # 3. Root build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        EOF

        # 4. AndroidManifest.xml (Camera and Flashlight permissions added)
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.fastchat.flashlight">

            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.FLASHLIGHT" />
            
            <uses-feature android:name="android.hardware.camera" />
            <uses-feature android:name="android.hardware.camera.flash" />

            <application
                android:label="⚡ Flash Pro Controller"
                android:theme="@style/Theme.Flashlight"
                android:icon="@mipmap/ic_launcher">
                
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # Dummy Icon to prevent build failure
        mkdir -p app/src/main/res/mipmap-hdpi
        echo "" > app/src/main/res/mipmap-hdpi/ic_launcher.png

        # 5. Background UI Drawable (Premium Dark Theme Layout)
        cat << 'EOF' > app/src/main/res/drawable/main_bg.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <gradient android:startColor="#0F172A" android:endColor="#1E293B" android:angle="90"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/button_circle.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#334155"/>
            <corners android:radius="100dp"/>
            <stroke android:width="3dp" android:color="#38BDF8"/>
        </shape>
        EOF

        # 6. UI Layout XML (activity_main.xml)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:background="@drawable/main_bg"
            android:padding="25dp" android:gravity="center_horizontal">

            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="⚡ FLASH PRO" android:textColor="#38BDF8" android:textSize="28sp"
                android:textStyle="bold" android:layout_marginTop="20dp"/>
                
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Advanced Hardware Controller" android:textColor="#94A3B8" android:textSize="14sp"/>

            <!-- Main Toggle Button -->
            <RelativeLayout android:layout_width="match_parent" android:layout_height="0dp"
                android:layout_weight="1" android:gravity="center">
                
                <ToggleButton android:id="@+id/btn_flash_toggle" android:layout_width="140dp" android:layout_height="140dp"
                    android:background="@drawable/button_circle" android:textOn="ON" android:textOff="OFF"
                    android:textColor="#FFFFFF" android:textSize="22sp" android:textStyle="bold"/>
            </RelativeLayout>

            <!-- Control Panel -->
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="vertical" android:background="#1E293B" android:padding="20dp"
                android:layout_marginBottom="20dp">

                <!-- Slider 1: Brightness Control -->
                <TextView android:id="@+id/tv_brightness_label" android:layout_width="wrap_content" android:layout_height="wrap_content"
                    android:text="💡 Brightness Level: 100%" android:textColor="#F1F5F9" android:textSize="15sp" android:textStyle="bold"/>
                
                <SeekBar android:id="@+id/seek_brightness" android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:layout_marginTop="10dp" android:layout_marginBottom="25dp" android:max="10" android:progress="10"/>

                <!-- Slider 2: Blinking / Strobe Speed -->
                <TextView android:id="@+id/tv_speed_label" android:layout_width="wrap_content" android:layout_height="wrap_content"
                    android:text="⏱️ Blinking Speed: Static (Always On)" android:textColor="#F1F5F9" android:textSize="15sp" android:textStyle="bold"/>
                
                <SeekBar android:id="@+id/seek_speed" android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:layout_marginTop="10dp" android:max="10" android:progress="0"/>

            </LinearLayout>
        </LinearLayout>
        EOF

        # 7. Java Implementation (MainActivity.java with Real-time Threading)
        cat << 'EOF' > app/src/main/java/com/fastchat/flashlight/MainActivity.java
        package com.fastchat.flashlight;

        import android.Manifest;
        import android.content.Context;
        import android.content.pm.PackageManager;
        import android.hardware.camera2.CameraManager;
        import android.os.Build;
        import android.os.Bundle;
        import android.widget.SeekBar;
        import android.widget.TextView;
        import android.widget.Toast;
        import android.widget.ToggleButton;
        import androidx.annotation.NonNull;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;

        public class MainActivity extends AppCompatActivity {
            private static final int CAMERA_REQ_CODE = 44;

            private ToggleButton btnFlashToggle;
            private SeekBar seekBrightness, seekSpeed;
            private TextView tvBrightnessLabel, tvSpeedLabel;

            private CameraManager cameraManager;
            private String cameraId;
            
            private boolean isFlashOn = false;
            private int brightnessLevel = 10; // Default max
            private int blinkSpeed = 0;        // 0 means Static Always On
            
            private Thread blinkThread;
            private volatile boolean isBlinkingRunning = false;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                btnFlashToggle = findViewById(R.id.btn_flash_toggle);
                seekBrightness = findViewById(R.id.seek_brightness);
                seekSpeed = findViewById(R.id.seek_speed);
                tvBrightnessLabel = findViewById(R.id.tv_brightness_label);
                tvSpeedLabel = findViewById(R.id.tv_speed_label);

                cameraManager = (CameraManager) getSystemService(Context.CAMERA_SERVICE);
                try {
                    String[] list = cameraManager.getCameraIdList();
                    if (list.length > 0) cameraId = list[0]; // Back Camera Flash
                } catch (Exception e) {
                    Toast.makeText(this, "Hardware Flashlight not found!", Toast.LENGTH_SHORT).show();
                }

                // Request Runtime Camera Permission
                if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, CAMERA_REQ_CODE);
                }

                btnFlashToggle.setOnClickListener(v -> {
                    isFlashOn = btnFlashToggle.isChecked();
                    updateFlashState();
                });

                // Slider 1: Brightness Slider Logic
                seekBrightness.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                    @Override
                    public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                        if (progress == 0) progress = 1; // Minimum level cannot be zero
                        brightnessLevel = progress;
                        tvBrightnessLabel.setText("💡 Brightness Level: " + (brightnessLevel * 10) + "%");
                        if (isFlashOn && blinkSpeed == 0) {
                            applyHardwareFlash(true);
                        }
                    }
                    @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                    @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                });

                // Slider 2: Blinking Speed Slider Logic
                seekSpeed.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                    @Override
                    public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                        blinkSpeed = progress;
                        if (blinkSpeed == 0) {
                            tvSpeedLabel.setText("⏱️ Blinking Speed: Static (Always On)");
                        } else {
                            tvSpeedLabel.setText("⏱️ Blinking Speed Level: " + blinkSpeed + " Hz");
                        }
                        if (isFlashOn) {
                            updateFlashState(); // Reset toggle streams
                        }
                    }
                    @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                    @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                });
            }

            private void updateFlashState() {
                if (!isFlashOn) {
                    stopBlinkingEngine();
                    applyHardwareFlash(false);
                } else {
                    if (blinkSpeed == 0) {
                        stopBlinkingEngine();
                        applyHardwareFlash(true);
                    } else {
                        startBlinkingEngine();
                    }
                }
            }

            private void applyHardwareFlash(boolean status) {
                if (cameraId == null) return;
                try {
                    if (status) {
                        // If phone supports Brightness control (Android 13+)
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                            try {
                                int maxLevel = cameraManager.getCameraCharacteristics(cameraId)
                                        .get(android.hardware.camera2.CameraCharacteristics.FLASH_INFO_STRENGTH_MAX_LEVEL);
                                if (maxLevel > 1) {
                                    int calculatedStrength = (int) ((brightnessLevel / 10.0) * maxLevel);
                                    if (calculatedStrength < 1) calculatedStrength = 1;
                                    cameraManager.turnOnTorchWithStrengthLevel(cameraId, calculatedStrength);
                                    return;
                                }
                            } catch (Exception ignored) {}
                        }
                        // Standard On if strength control not available
                        cameraManager.setTorchMode(cameraId, true);
                    } else {
                        cameraManager.setTorchMode(cameraId, false);
                    }
                } catch (Exception e) {
                    e.printStackTrace();
                }
            }

            private void startBlinkingEngine() {
                stopBlinkingEngine(); // clear existing thread if running
                isBlinkingRunning = true;
                blinkThread = new Thread(() -> {
                    while (isBlinkingRunning) {
                        try {
                            applyHardwareFlash(true);
                            // Higher seek value means shorter sleep -> faster blinking
                            long sleepTime = 600 / blinkSpeed; 
                            Thread.sleep(sleepTime);
                            applyHardwareFlash(false);
                            Thread.sleep(sleepTime);
                        } catch (InterruptedException e) {
                            break;
                        } catch (Exception e) {
                            e.printStackTrace();
                        }
                    }
                });
                blinkThread.start();
            }

            private void stopBlinkingEngine() {
                isBlinkingRunning = false;
                if (blinkThread != null) {
                    blinkThread.interrupt();
                    blinkThread = null;
                }
            }

            @Override
            public void onRequestPermissionsResult(int code, @NonNull String[] perms, @NonNull int[] results) {
                super.onRequestPermissionsResult(code, perms, results);
                if (code == CAMERA_REQ_CODE && results.length > 0 && results[0] != PackageManager.PERMISSION_GRANTED) {
                    Toast.makeText(this, "Camera permission required for flash control!", Toast.LENGTH_LONG).show();
                }
            }

            @Override
            protected void onPause() {
                super.onPause();
                // Turn off safely when leaving app to prevent overheating
                if (isFlashOn) {
                    btnFlashToggle.setChecked(false);
                    isFlashOn = false;
                    updateFlashState();
                }
            }
        }
        EOF

        # 8. Color Themes & Styles
        cat << 'EOF' > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.Flashlight" parent="Theme.MaterialComponents.Light.NoActionBar">
                <item name="colorPrimary">#0F172A</item>
                <item name="colorPrimaryDark">#020617</item>
                <item name="colorAccent">#38BDF8</item>
                <item name="android:statusBarColor">#0F172A</item>
            </style>
        </resources>
        EOF

        # 9. App-Level build.gradle Configuration
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.fastchat.flashlight'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.flashlight'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: 🏗️ Create Gradle Wrapper & Run Build
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Flash-Pro-Controller
        path: app/build/outputs/apk/debug/app-debug.apk
