name: Build Realistic Racing Game

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure & Assets
      run: |
        mkdir -p src/main/java/com/fastchat/racing/
        mkdir -p src/main/res/layout/
        mkdir -p src/main/res/values/
        mkdir -p src/main/assets/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "NitroVelocity"
        EOF

        # 3. Single build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2'
        }

        android {
            namespace 'com.fastchat.racing'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.racing'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 4. AndroidManifest.xml
        cat << 'EOF' > src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="🏎️ Nitro Velocity 3D"
                android:theme="@style/Theme.AppCompat.NoActionBar"
                android:hardwareAccelerated="true">
                <activity android:name="com.fastchat.racing.MainActivity"
                    android:screenOrientation="landscape"
                    android:configChanges="orientation|screenSize|keyboardHidden"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 5. UI Layout
        cat << 'EOF' > src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#000000">
            <android.webkit.WebView
                android:id="@+id/game_webview"
                android:layout_width="match_parent"
                android:layout_height="match_parent" />
        </RelativeLayout>
        EOF

        # 6. High-Graphics Realistic 3D Game Engine (Three.js WebGL)
        cat << 'EOF' > src/main/assets/game.html
        <!DOCTYPE html>
        <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
            <style>
                body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; }
                canvas { display: block; width: 100vw; height: 100vh; }
                
                .control-btn {
                    position: absolute; width: 85px; height: 85px;
                    background: rgba(30, 41, 59, 0.7); border: 2px solid #38bdf8;
                    border-radius: 50%; color: #fff; font-weight: bold; font-size: 18px;
                    display: flex; align-items: center; justify-content: center;
                    box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
                }
                .control-btn:active { background: rgba(56, 189, 248, 0.5); }
                
                #btn-left { bottom: 30px; left: 30px; }
                #btn-right { bottom: 30px; left: 140px; }
                #btn-back { bottom: 30px; right: 140px; border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
                #btn-race { bottom: 30px; right: 30px; border-color: #22c55e; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
                
                #speedometer {
                    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
                    color: #38bdf8; font-size: 24px; font-weight: bold;
                    background: rgba(15, 23, 42, 0.8); padding: 8px 20px;
                    border-radius: 10px; border: 1px solid #38bdf8;
                    text-shadow: 0 0 10px #38bdf8;
                }
            </style>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        </head>
        <body>
            <div id="speedometer">0 KM/H</div>
            <div class="control-btn" id="btn-left">◀</div>
            <div class="control-btn" id="btn-right">▶</div>
            <div class="control-btn" id="btn-back">BRK</div>
            <div class="control-btn" id="btn-race">GAS</div>

            <script>
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0f172a);
                scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.body.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xfff7e6, 1.2);
                dirLight.position.set(20, 40, 20);
                dirLight.castShadow = true;
                scene.add(dirLight);

                const roadGeo = new THREE.PlaneGeometry(16, 2000);
                const roadMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8, metalness: 0.2 });
                const road = new THREE.Mesh(roadGeo, roadMat);
                road.rotation.x = -Math.PI / 2;
                road.receiveShadow = true;
                scene.add(road);

                for(let i = 0; i < 20; i++) {
                    const lineGeo = new THREE.PlaneGeometry(0.3, 15);
                    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    const line = new THREE.Mesh(lineGeo, lineMat);
                    line.rotation.x = -Math.PI / 2;
                    line.position.set(0, 0.02, -i * 60);
                    scene.add(line);
                }

                const carGroup = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.2, metalness: 0.9 });
                const bodyGeo = new THREE.BoxGeometry(2, 0.6, 4.5);
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.5;
                body.castShadow = true;
                carGroup.add(body);

                const cabinGeo = new THREE.BoxGeometry(1.6, 0.5, 2);
                const cabinMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.1, metalness: 1.0, transparent: true, opacity: 0.7 });
                const cabin = new THREE.Mesh(cabinGeo, cabinMat);
                cabin.position.set(0, 0.9, -0.3);
                carGroup.add(cabin);

                const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 24);
                const wheelMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.5 });
                const frontLeft = new THREE.Mesh(wheelGeo, wheelMat);
                frontLeft.rotation.z = Math.PI / 2;
                frontLeft.position.set(-1.1, 0.45, -1.4);
                
                const frontRight = frontLeft.clone(); frontRight.position.x = 1.1;
                const rearLeft = frontLeft.clone(); rearLeft.position.z = 1.4;
                const rearRight = frontRight.clone(); rearRight.position.z = 1.4;
                
                carGroup.add(frontLeft, frontRight, rearLeft, rearRight);
                scene.add(carGroup);

                let speed = 0;
                const maxSpeed = 1.5;      
                const maxReverseSpeed = -0.5;
                const accel = 0.015;
                const deccel = 0.008;       
                const brakingPower = 0.04;   
                const turnSpeed = 0.04;

                let inputs = { left: false, right: false, race: false, back: false };

                function updatePhysics() {
                    if (inputs.race) {
                        if (speed < 0) speed += brakingPower;
                        else speed += accel;
                    }
                    if (inputs.back) {
                        if (speed > 0) speed -= brakingPower;
                        else speed -= accel;
                    }
                    if (!inputs.race && !inputs.back) {
                        if (speed > 0) speed = Math.max(0, speed - deccel);
                        if (speed < 0) speed = Math.min(0, speed + deccel);
                    }

                    speed = Math.max(maxReverseSpeed, Math.min(maxSpeed, speed));
                    carGroup.position.z -= speed;

                    if (Math.abs(speed) > 0.05) {
                        const direct = speed > 0 ? 1 : -1;
                        if (inputs.left) carGroup.position.x -= turnSpeed * direct;
                        if (inputs.right) carGroup.position.x += turnSpeed * direct;
                    }

                    carGroup.position.x = Math.max(-7, Math.min(7, carGroup.position.x));
                    document.getElementById('speedometer').innerText = Math.round(Math.abs(speed) * 160) + " KM/H";
                }

                function setupBtn(id, key) {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); inputs[key] = true; });
                    el.addEventListener('touchend', (e) => { e.preventDefault(); inputs[key] = false; });
                }
                setupBtn('btn-left', 'left');
                setupBtn('btn-right', 'right');
                setupBtn('btn-race', 'race');
                setupBtn('btn-back', 'back');

                function updateCamera() {
                    camera.position.set(carGroup.position.x, carGroup.position.y + 2.5, carGroup.position.z + 6.5);
                    camera.lookAt(new THREE.Vector3(carGroup.position.x, carGroup.position.y + 0.8, carGroup.position.z - 5));
                }

                function animate() {
                    requestAnimationFrame(animate);
                    updatePhysics();
                    updateCamera();
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            </script>
        </body>
        </html>
        EOF

        # 7. MainActivity.java
        cat << 'EOF' > src/main/java/com/fastchat/racing/MainActivity.java
        package com.fastchat.racing;

        import android.annotation.SuppressLint;
        import android.os.Bundle;
        import android.view.View;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            private WebView webView;

            @SuppressLint("SetJavaScriptEnabled")
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                getWindow().getDecorView().setSystemUiVisibility(
                    View.SYSTEM_UI_FLAG_FULLSCREEN |
                    View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                    View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                );

                webView = findViewById(R.id.game_webview);
                WebSettings settings = webView.getSettings();
                
                settings.setJavaScriptEnabled(true);
                settings.setDomStorageEnabled(true);
                settings.setAllowFileAccess(true);
                settings.setLoadsImagesAutomatically(true);
                
                webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                webView.loadUrl("file:///android_asset/game.html");
            }

            @Override
            protected void onDestroy() {
                if (webView != null) webView.destroy();
                super.onDestroy();
            }
        }
        EOF

        # 8. Resources
        cat << 'EOF' > src/main/res/values/strings.xml
        <resources><string name="app_name">Nitro Velocity</string></resources>
        EOF
        cat << 'EOF' > src/main/res/values/styles.xml
        <resources></resources>
        EOF

    - name: 🏗️ Create Gradle Wrapper & Run Build
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    # SMART FIX: Automatically scans and copies any generated APK to root directory for safe delivery
    - name: 🔍 Locate and Stage APK
      run: |
        mkdir -p final-apk/
        find . -name "*.apk" -exec cp {} final-apk/game-release.apk \;
        ls -la final-apk/

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Realistic-Nitro-Game
        path: final-apk/game-release.apk
