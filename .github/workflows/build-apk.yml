    - name: 📝 Fix Java Controllers (Resolved Method Override Signature Error)
      run: |
        cat << 'EOF' > app/src/main/java/com/fastchat/pro/LoginActivity.java
        package com.fastchat.pro;

        import android.content.Intent;
        import android.os.Bundle;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        public class LoginActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_login);

                @SuppressWarnings("unused")
                String fbCheck = FirebaseConfig.API_KEY; 

                EditText etEmail = findViewById(R.id.etEmail);
                EditText etPassword = findViewById(R.id.etPassword);
                Button btnLogin = findViewById(R.id.btnLogin);
                TextView tvRegister = findViewById(R.id.tvGoToRegister);

                tvRegister.setOnClickListener(v -> startActivity(new Intent(this, RegisterActivity.class)));

                btnLogin.setOnClickListener(v -> {
                    String email = etEmail.getText().toString().trim();
                    String pass = etPassword.getText().toString().trim();
                    if(!email.isEmpty() && !pass.isEmpty()) {
                        startActivity(new Intent(LoginActivity.this, DashboardActivity.class));
                        finish();
                    } else {
                        Toast.makeText(this, "Fields cannot be left blank", Toast.LENGTH_SHORT).show();
                    }
                });
            }
        }
        EOF

