name: Build FastChat Pro Messaging & Calling App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure
      run: |
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/res/drawable/
        mkdir -p app/src/main/java/com/fastchat/pro/

    - name: 🔑 Inject Firebase Configuration & Strings
      run: |
        # Strings and App Identity
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">FastChat Pro</string>
        </resources>
        EOF

        # Custom Colors for Dark Premium UI
        cat << 'EOF' > app/src/main/res/values/colors.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="bg_dark">#0B111E</color>
            <color name="surface_dark">#161F30</color>
            <color name="accent_green">#00FFCC</color>
            <color name="text_white">#FFFFFF</color>
            <color name="text_gray">#94A3B8</color>
            <color name="link_blue">#2563EB</color>
            <color name="call_red">#EF4444</color>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.FastChat" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                <item name="colorPrimary">@color/accent_green</item>
                <item name="android:windowBackground">@color/bg_dark</item>
            </style>
        </resources>
        EOF

        # Auto-Generating Firebase Configuration Class from your credentials
        cat << 'EOF' > app/src/main/java/com/fastchat/pro/FirebaseConfig.java
        package com.fastchat.pro;

        public class FirebaseConfig {
            public static final String API_KEY = "AIzaSyAOsGkBI2QDkZAuogCEWsX2Eu3Q2jJYeCE";
            public static final String AUTH_DOMAIN = "movi-hub.firebaseapp.com";
            public static final String DATABASE_URL = "https://movi-hub-default-rtdb.firebaseio.com";
            public static final String PROJECT_ID = "movi-hub";
            public static final String STORAGE_BUCKET = "movi-hub.firebasestorage.app";
        }
        EOF

    - name: 🎨 Create Authentication UI Layouts (Login & Register)
      run: |
        # Login Layout
        cat << 'EOF' > app/src/main/res/layout/activity_login.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="@color/bg_dark"
            android:padding="24dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="💬 FastChat Pro"
                android:textColor="@color/accent_green"
                android:textSize="32sp"
                android:textStyle="bold"
                android:layout_marginBottom="40dp"/>

            <EditText
                android:id="@+id/etEmail"
                android:layout_width="match_parent"
                android:layout_height="55dp"
                android:hint="Email Address"
                android:textColorHint="@color/text_gray"
                android:textColor="@color/text_white"
                android:background="@color/surface_dark"
                android:padding="16dp"
                android:inputType="textEmailAddress"
                android:layout_marginBottom="16dp"/>

            <EditText
                android:id="@+id/etPassword"
                android:layout_width="match_parent"
                android:layout_height="55dp"
                android:hint="Password"
                android:textColorHint="@color/text_gray"
                android:textColor="@color/text_white"
                android:background="@color/surface_dark"
                android:padding="16dp"
                android:inputType="textPassword"
                android:layout_marginBottom="24dp"/>

            <Button
                android:id="@+id/btnLogin"
                android:layout_width="match_parent"
                android:layout_height="55dp"
                android:text="Login"
                android:textColor="@color/bg_dark"
                android:backgroundTint="@color/accent_green"
                android:textStyle="bold"/>

            <TextView
                android:id="@+id/tvGoToRegister"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Don't have an account? Register"
                android:textColor="@color/text_gray"
                android:layout_marginTop="20dp"
                android:textSize="14sp"/>
        </LinearLayout>
        EOF

        # Register Layout
        cat << 'EOF' > app/src/main/res/layout/activity_register.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="@color/bg_dark"
            android:padding="24dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Create Account"
                android:textColor="@color/accent_green"
                android:textSize="28sp"
                android:textStyle="bold"
                android:layout_marginBottom="30dp"/>

            <EditText
                android:id="@+id/etRegName"
                android:layout_width="match_parent"
                android:layout_height="55dp"
                android:hint="Full Name"
                android:textColorHint="@color/text_gray"
                android:textColor="@color/text_white"
                android:background="@color/surface_dark"
                android:padding="16dp"
                android:layout_marginBottom="16dp"/>

            <EditText
                android:id="@+id/etRegEmail"
                android:layout_width="match_parent"
                android:layout_height="55dp"
                android:hint="Email Address"
                android:textColorHint="@color/text_gray"
                android:textColor="@color/text_white"
                android:background="@color/surface_dark"
                android:padding="16dp"
                android:layout_marginBottom="16dp"/>

            <EditText
                android:id="@+id/etRegPassword"
                android:layout_width="match_parent"
                android:layout_height="55dp"
                android:hint="Password"
                android:textColorHint="@color/text_gray"
                android:textColor="@color/text_white"
                android:background="@color/surface_dark"
                android:padding="16dp"
                android:inputType="textPassword"
                android:layout_marginBottom="24dp"/>

            <Button
                android:id="@+id/btnRegister"
                android:layout_width="match_parent"
                android:layout_height="55dp"
                android:text="Sign Up"
                android:textColor="@color/bg_dark"
                android:backgroundTint="@color/accent_green"
                android:textStyle="bold"/>
        </LinearLayout>
        EOF

    - name: 📱 Create Dashboard & Fullscreen Incoming Call UI
      run: |
        # Dashboard UI (User List + Bottom Right Profile Placement)
        cat << 'EOF' > app/src/main/res/layout/activity_dashboard.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="@color/bg_dark">

            <TextView
                android:id="@+id/tvHeader"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Active Chats"
                android:textColor="@color/text_white"
                android:textSize="22sp"
                android:textStyle="bold"
                android:layout_margin="20dp"/>

            <androidx.recyclerview.widget.RecyclerView
                android:id="@+id/rvUserList"
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:layout_below="@id/tvHeader"
                android:layout_above="@id/bottomBar"
                android:padding="10dp"/>

            <!-- Profile Modification Trigger Floating Action Button (Bottom Right) -->
            <com.google.android.material.floatingactionbutton.FloatingActionButton
                android:id="@+id/fabProfile"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:layout_alignParentEnd="true"
                android:layout_alignParentBottom="true"
                android:layout_margin="24dp"
                android:src="@android:drawable/ic_menu_edit"
                android:backgroundTint="@color/accent_green"
                android:contentDescription="Edit Profile"/>
        </RelativeLayout>
        EOF

        # Full-Screen Overriding Incoming Video Call Manager
        cat << 'EOF' > app/src/main/res/layout/activity_incoming_call.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0A0F1D"
            android:gravity="center">

            <TextView
                android:id="@+id/tvCallerName"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Incoming Video Call..."
                android:textColor="@color/text_white"
                android:textSize="24sp"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="100dp"
                android:textStyle="bold"/>

            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="horizontal"
                android:weightSum="2"
                android:layout_alignParentBottom="true"
                android:layout_marginBottom="80dp"
                android:padding="20dp">

                <Button
                    android:id="@+id/btnDeclineCall"
                    android:layout_width="0dp"
                    android:layout_height="60dp"
                    android:layout_weight="1"
                    android:text="Decline"
                    android:layout_marginRight="10dp"
                    android:backgroundTint="@color/call_red"
                    android:textColor="@color/text_white"/>

                <Button
                    android:id="@+id/btnAnswerCall"
                    android:layout_width="0dp"
                    android:layout_height="60dp"
                    android:layout_weight="1"
                    android:text="Answer"
                    android:layout_marginLeft="10dp"
                    android:backgroundTint="@color/accent_green"
                    android:textColor="@color/bg_dark"/>
            </LinearLayout>
        </RelativeLayout>
        EOF

    - name: 📝 Build Java Source Modules (Auth Controllers)
      run: |
        cat << 'EOF' > app/src/main/java/com/fastchat/pro/LoginActivity.java
        package com.fastchat.pro;

        import android.content.Intent;
        import android.os.Bundle;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        public class LoginActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_login);

                EditText etEmail = findViewById(R.id.etEmail);
                EditText etPassword = findViewById(R.id.etPassword);
                Button btnLogin = findViewById(R.id.btnLogin);
                TextView tvRegister = findViewById(R.id.tvGoToRegister);

                tvRegister.setOnClickListener(v -> startActivity(new Intent(this, RegisterActivity.class)));

                btnLogin.setOnClickListener(v -> {
                    String email = etEmail.getText().toString().trim();
                    String pass = etPassword.getText().toString().trim();
                    if(!email.isEmpty() && !pass.isEmpty()) {
                        // Temp Direct Route to Dashboard for Architecture validation
                        Intent intent = new Intent(LoginActivity.this, DashboardActivity.class);
                        startActivity(intent);
                        finish();
                    } else {
                        Toast.makeText(this, "Fill Credentials", Toast.LENGTH_SHORT).show();
                    }
                });
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/pro/RegisterActivity.java
        package com.fastchat.pro;

        import android.os.Bundle;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        public class RegisterActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_register);

                EditText etName = findViewById(R.id.etRegName);
                EditText etEmail = findViewById(R.id.etRegEmail);
                EditText etPassword = findViewById(R.id.etRegPassword);
                Button btnReg = findViewById(R.id.btnRegister);

                btnReg.setOnClickListener(v -> {
                    if(!etName.getText().toString().isEmpty() && !etEmail.getText().toString().isEmpty()) {
                        Toast.makeText(this, "Account Configured!", Toast.LENGTH_SHORT).show();
                        finish();
                    }
                });
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/pro/DashboardActivity.java
        package com.fastchat.pro;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class DashboardActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_dashboard);
            }
        }
        EOF

    - name: 📱 Write Android Manifest Configuration
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />

            <application android:label="FastChat Pro" android:theme="@style/Theme.FastChat">
                
                <activity android:name="com.fastchat.pro.LoginActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <activity android:name="com.fastchat.pro.RegisterActivity" android:exported="false" />
                <activity android:name="com.fastchat.pro.DashboardActivity" android:exported="false" />
            </application>
        </manifest>
        EOF

    - name: 🏗️ Setup Root Gradle Build Environments
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.useAndroidX=true" > gradle.properties

        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace "com.fastchat.pro"
            compileSdk 34
            defaultConfig {
                applicationId "com.fastchat.pro"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
        }
        EOF

    - name: Setup Gradle Build Tool
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: 🏗️ Compile and Pack FastChat Architecture
      run: gradle assembleDebug

    - name: 📥 Deliver Project Blueprint
      uses: actions/upload-artifact@v4
      with:
        name: FastChat-Pro-Base
        path: app/build/outputs/apk/debug/app-debug.apk
