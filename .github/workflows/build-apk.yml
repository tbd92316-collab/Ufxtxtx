name: Build Full UI Keyboard App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Filesystem, Repositories & AndroidX
      run: |
        mkdir -p app/src/main/java/com/fastchat/keyboard/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/xml/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':app'
        EOF

        # 3. Root build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        EOF

        # 4. Main Manifest with Modern Storage Permissions
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.fastchat.keyboard">
            
            <!-- Permissions for Storage and Media -->
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />

            <application android:label="Premium Image Keyboard" android:theme="@style/Theme.AppCompat.NoActionBar">
                
                <!-- Keyboard Service -->
                <service android:name=".ImageKeyboardService" android:permission="android.permission.BIND_INPUT_METHOD" android:exported="true">
                    <intent-filter>
                        <action android:name="android.view.InputMethod" />
                    </intent-filter>
                    <meta-data android:name="android.view.im" android:resource="@xml/method" />
                </service>

                <!-- Helper Activity to handle Image Picker and Permissions from Keyboard -->
                <activity android:name=".PickerActivity" android:theme="@style/Theme.AppCompat.Translucent" android:exported="false" />
                
            </application>
        </manifest>
        EOF

        # 5. Helper Activity for Handling Gallery & Permissions
        cat << 'EOF' > app/src/main/java/com/fastchat/keyboard/PickerActivity.java
        package com.fastchat.keyboard;

        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.provider.MediaStore;
        import android.widget.Toast;
        import androidx.annotation.NonNull;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;

        public class PickerActivity extends AppCompatActivity {
            private static final int PERM_CODE = 101;
            private static final int PICK_IMAGE = 102;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                checkAndRequestPermission();
            }

            private void checkAndRequestPermission() {
                String permission = (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) 
                        ? Manifest.permission.READ_MEDIA_IMAGES : Manifest.permission.READ_EXTERNAL_STORAGE;

                if (ContextCompat.checkSelfPermission(this, permission) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{permission}, PERM_CODE);
                } else {
                    openGallery();
                }
            }

            private void openGallery() {
                Intent intent = new Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI);
                startActivityForResult(intent, PICK_IMAGE);
            }

            @Override
            public void onRequestPermissionsResult(int requestCode, @NonNull String[] permissions, @NonNull int[] grantResults) {
                super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                if (requestCode == PERM_CODE && grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                    openGallery();
                } else {
                    Toast.makeText(this, "Permission Denied!", Toast.LENGTH_SHORT).show();
                    finish();
                }
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == PICK_IMAGE && resultCode == RESULT_OK && data != null) {
                    Uri imageUri = data.getData();
                    if (imageUri != null) {
                        // Image URI copy to static variable or broadcast to Keyboard Service
                        ImageKeyboardService.selectedImageUri = imageUri;
                    }
                }
                finish();
            }
        }
        EOF

        # 6. Keyboard Service Logic linked to Picker Activity
        cat << 'EOF' > app/src/main/java/com/fastchat/keyboard/ImageKeyboardService.java
        package com.fastchat.keyboard;

        import android.content.Intent;
        import android.inputmethodservice.InputMethodService;
        import android.net.Uri;
        import android.view.View;
        import android.view.inputmethod.InputConnection;
        import android.widget.Button;

        public class ImageKeyboardService extends InputMethodService {
            public static Uri selectedImageUri = null;

            @Override 
            public View onCreateInputView() {
                View view = getLayoutInflater().inflate(R.layout.keyboard_view, null);
                
                setupKey(view, R.id.key_q, "q"); setupKey(view, R.id.key_w, "w");
                setupKey(view, R.id.key_e, "e"); setupKey(view, R.id.key_r, "r");
                setupKey(view, R.id.key_t, "t"); setupKey(view, R.id.key_y, "y");
                setupKey(view, R.id.key_u, "u"); setupKey(view, R.id.key_i, "i");
                setupKey(view, R.id.key_o, "o"); setupKey(view, R.id.key_p, "p");
                setupKey(view, R.id.key_space, " ");

                Button del = view.findViewById(R.id.key_delete);
                if(del != null) {
                    del.setOnClickListener(v -> {
                        InputConnection ic = getCurrentInputConnection();
                        if (ic != null) ic.deleteSurroundingText(1, 0);
                    });
                }

                // Image Selection Button Trigger
                Button btnSelectImage = view.findViewById(R.id.btn_select_image);
                if (btnSelectImage != null) {
                    btnSelectImage.setOnClickListener(v -> {
                        Intent intent = new Intent(ImageKeyboardService.this, PickerActivity.class);
                        intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                        startActivity(intent);
                    });
                }

                return view;
            }

            @Override
            public void onWindowShown() {
                super.onWindowShown();
                // Check if any image was picked and paste its URI string
                if (selectedImageUri != null) {
                    InputConnection ic = getCurrentInputConnection();
                    if (ic != null) {
                        ic.commitText("[Image: " + selectedImageUri.toString() + "]", 1);
                    }
                    selectedImageUri = null; // reset
                }
            }

            private void setupKey(View view, int id, String text) {
                Button btn = view.findViewById(id);
                if (btn != null) {
                    btn.setOnClickListener(v -> {
                        InputConnection ic = getCurrentInputConnection();
                        if (ic != null) ic.commitText(text, 1);
                    });
                }
            }
        }
        EOF

        # 7. Keyboard UI XML Layout
        cat << 'EOF' > app/src/main/res/layout/keyboard_view.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="wrap_content"
            android:orientation="vertical" android:background="#1E1E1E" android:padding="5dp">
            
            <LinearLayout android:layout_width="match_parent" android:layout_height="45dp" android:orientation="horizontal" android:gravity="center">
                <Button android:id="@+id/btn_select_image" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🖼️ INSERT IMAGE AS EMOJI" android:textSize="12sp" android:backgroundTint="#00E676" android:textColor="#000000"/>
            </LinearLayout>

            <LinearLayout android:layout_width="match_parent" android:layout_height="50dp" android:orientation="horizontal">
                <Button android:id="@+id/key_q" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="Q"/>
                <Button android:id="@+id/key_w" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="W"/>
                <Button android:id="@+id/key_e" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="E"/>
                <Button android:id="@+id/key_r" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="R"/>
                <Button android:id="@+id/key_t" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="T"/>
                <Button android:id="@+id/key_y" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="Y"/>
                <Button android:id="@+id/key_u" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="U"/>
                <Button android:id="@+id/key_i" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="I"/>
                <Button android:id="@+id/key_o" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="O"/>
                <Button android:id="@+id/key_p" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="P"/>
            </LinearLayout>

            <LinearLayout android:layout_width="match_parent" android:layout_height="50dp" android:orientation="horizontal" android:layout_marginTop="5dp">
                <Button android:id="@+id/key_space" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="3" android:text="SPACE"/>
                <Button android:id="@+id/key_delete" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:text="⌫" android:backgroundTint="#D32F2F"/>
            </LinearLayout>
        </LinearLayout>
        EOF

        # Styles definition to prevent crash on Translucent Activity
        mkdir -p app/src/main/res/values/
        cat << 'EOF' > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.AppCompat.Translucent" parent="Theme.AppCompat.NoActionBar">
                <item name="android:windowBackground">@android:color/transparent</item>
                <item name="android:windowIsTranslucent">true</item>
                <item name="android:windowContentOverlay">@null</item>
                <item name="android:windowNoTitle">true</item>
                <item name="android:backgroundDimEnabled">false</item>
            </style>
        </resources>
        EOF

        echo '<input-method xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/method.xml

        # 8. Correct App-Level build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.fastchat.keyboard'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.keyboard'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: 🏗️ Build Fixed APK
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Real-UI-Keyboard-App
        path: app/build/outputs/apk/debug/app-debug.apk
