name: Build Floating Dual Space App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Filesystem, Repositories & Properties
      run: |
        mkdir -p app/src/main/java/com/fastchat/dualspace/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/

        # 1. Gradle Properties (AndroidX Fix)
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':app'
        EOF

        # 3. Root build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        EOF

        # 4. Android Manifest with Overlay Permission
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.fastchat.dualspace">
            
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <uses-permission android:name="android.permission.INTERNET" />

            <application android:label="Floating Dual Space" android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.view.InputMethod" />
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name=".FloatingWindowService" android:exported="false" />

            </application>
        </manifest>
        EOF

        # 5. MainActivity (Permission Checker and Starter)
        cat << 'EOF' > app/src/main/java/com/fastchat/dualspace/MainActivity.java
        package com.fastchat.dualspace;

        import android.content.Intent;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.provider.Settings;
        import android.widget.Button;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            private static final int OVERLAY_PERMISSION_REQ_CODE = 1234;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                Button btnStart = new Button(this);
                btnStart.setText("Open Floating Browser / App Space");
                setContentView(btnStart);

                btnStart.setOnClickListener(v -> {
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) {
                        Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                Uri.parse("package:" + getPackageName()));
                        startActivityForResult(intent, OVERLAY_PERMISSION_REQ_CODE);
                    } else {
                        startFloatingSpace();
                    }
                });
            }

            private void startFloatingSpace() {
                startService(new Intent(MainActivity.this, FloatingWindowService.class));
                finish(); // Close main UI to see floating window over home screen
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == OVERLAY_PERMISSION_REQ_CODE) {
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && Settings.canDrawOverlays(this)) {
                        startFloatingSpace();
                    } else {
                        Toast.makeText(this, "Permission required for Floating Window!", Toast.LENGTH_SHORT).show();
                    }
                }
            }
        }
        EOF

        # 6. Floating Window Service Core Logic
        cat << 'EOF' > app/src/main/java/com/fastchat/dualspace/FloatingWindowService.java
        package com.fastchat.dualspace;

        import android.app.Service;
        import android.content.Context;
        import android.content.Intent;
        import android.graphics.PixelFormat;
        import android.os.Build;
        import android.os.IBinder;
        import android.view.Gravity;
        import android.view.LayoutInflater;
        import android.view.MotionEvent;
        import android.view.View;
        import android.view.WindowManager;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.widget.Button;

        public class FloatingWindowService extends Service {
            private WindowManager mWindowManager;
            private View mFloatingView;

            @Override
            public IBinder onBind(Intent intent) {
                return null;
            }

            @Override
            public void onCreate() {
                super.onCreate();
                mWindowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                
                // Layout inflate karna
                mFloatingView = LayoutInflater.from(this).inflate(R.layout.floating_layout, null);

                // Window layout parameters settings
                int layoutFlag;
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    layoutFlag = WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY;
                } else {
                    layoutFlag = WindowManager.LayoutParams.TYPE_PHONE;
                }

                final WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        layoutFlag,
                        WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                        PixelFormat.TRANSLUCENT);

                params.gravity = Gravity.TOP | Gravity.START;
                params.x = 100;
                params.y = 100;

                // Adjust window size
                params.width = 800;
                params.height = 1000;

                // WebView integrate karna cloned view mimic karne ke liye
                WebView webView = mFloatingView.findViewById(R.id.floating_webview);
                webView.setWebViewClient(new WebViewClient());
                webView.getSettings().setJavaScriptEnabled(true);
                webView.loadUrl("https://www.google.com"); // Dual space placeholder

                // Close button logic
                Button btnClose = mFloatingView.findViewById(R.id.btn_close_floating);
                btnClose.setOnClickListener(v -> stopSelf());

                // Touch and drag window logic
                mFloatingView.findViewById(R.id.floating_header).setOnTouchListener(new View.OnTouchListener() {
                    private int initialX;
                    private int initialY;
                    private float initialTouchX;
                    private float initialTouchY;

                    @Override
                    public boolean onTouch(View v, MotionEvent event) {
                        switch (event.getAction()) {
                            case MotionEvent.ACTION_DOWN:
                                initialX = params.x;
                                initialY = params.y;
                                initialTouchX = event.getRawX();
                                initialTouchY = event.getRawY();
                                return true;
                            case MotionEvent.ACTION_MOVE:
                                params.x = initialX + (int) (event.getRawX() - initialTouchX);
                                params.y = initialY + (int) (event.getRawY() - initialTouchY);
                                mWindowManager.updateViewLayout(mFloatingView, params);
                                return true;
                        }
                        return false;
                    }
                });

                mWindowManager.addView(mFloatingView, params);
            }

            @Override
            public void onDestroy() {
                super.onDestroy();
                if (mFloatingView != null) mWindowManager.removeView(mFloatingView);
            }
        }
        EOF

        # 7. Floating UI Layout XML (With Header & Drag handle)
        cat << 'EOF' > app/src/main/res/layout/floating_layout.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:background="#222222">
            
            <LinearLayout android:id="@+id/floating_header" android:layout_width="match_parent"
                android:layout_height="40dp" android:background="#333333" android:orientation="horizontal" android:padding="5dp">
                <View android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                <Button android:id="@+id/btn_close_floating" android:layout_width="wrap_content"
                    android:layout_height="match_parent" android:text="X" android:backgroundTint="#FF3333" android:textColor="#FFFFFF"/>
            </LinearLayout>

            <WebView android:id="@+id/floating_webview" android:layout_width="match_parent" android:layout_height="match_parent" />
        </LinearLayout>
        EOF

        # Dummy resources to avoid compile errors
        echo '<resources><style name="Theme.AppCompat.Light.DarkActionBar" parent=""/></resources>' > app/src/main/res/values/styles.xml

        # 8. App-Level build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.fastchat.dualspace'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.dualspace'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

    - name: 🏗️ Build Floating Space APK
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Floating-DualSpace-App
        path: app/build/outputs/apk/debug/app-debug.apk
