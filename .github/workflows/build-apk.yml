name: Build Battery and Temp Monitor APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create Project Files
        run: |
          mkdir -p BatteryApp/app/src/main/java/com/example/batteryapp
          mkdir -p BatteryApp/app/src/main/res/layout
          
          # 1. Root Settings
          echo 'rootProject.name = "BatteryTempMonitor"' > BatteryApp/settings.gradle
          echo "include ':app'" >> BatteryApp/settings.gradle

          # 2. Root Build
          echo 'buildscript { repositories { google(); mavenCentral() } dependencies { classpath "com.android.tools.build:gradle:8.1.4" } }' > BatteryApp/build.gradle

          # 3. App Build
          cat > BatteryApp/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.batteryapp'
              compileSdk 34
              defaultConfig { applicationId "com.example.batteryapp"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          EOF

          # 4. AndroidManifest (ISSE ERROR AA RAHA THA)
          cat > BatteryApp/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.example.batteryapp" />
          EOF

      - name: Build APK
        working-directory: ./BatteryApp
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Battery-Temp-Monitor-APK
          path: BatteryApp/app/build/outputs/apk/debug/app-debug.apk
