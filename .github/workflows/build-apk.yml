name: Build Automated AdBlock YouTube APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Auto-Generate Entire Android Project Structure
      run: |
        echo "Starting automatic structural build..."
        
        # 1. Create all necessary directory paths
        mkdir -p app/src/main/assets/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/java/com/adblock/ytapp/
        
        # 2. Automatically generate the Embedded AdBlocker HTML/JS Interface
        cat << 'EOF' > app/src/main/assets/index.html
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Ad-Free Player</title>
            <style>
                :root { --bg: #0f0f0f; --card: #1f1f1f; --text: #f1f1f1; --accent: #ff0000; }
                * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
                body { background: var(--bg); color: var(--text); padding-bottom: 30px; }
                header { background: var(--bg); padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
                input { flex: 1; background: #222; border: 1px solid #3c3c3c; padding: 12px; color: #fff; border-radius: 8px; font-size: 1rem; outline:none; }
                button { background: #ff0000; border: none; color: #fff; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
                main { max-width: 1200px; margin: 15px auto; padding: 0 15px; }
                .player-box { display: none; margin-bottom: 20px; border-radius: 12px; overflow: hidden; background: #000; }
                .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
                .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }
                .player-meta { padding: 15px; background: var(--card); }
                .badge { display: inline-block; background: rgba(43,206,107,0.2); color: #2bce6b; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; margin-top: 5px; }
                .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
                .card { background: var(--card); border-radius: 8px; overflow: hidden; cursor: pointer; }
                .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
                .details { padding: 10px; font-size: 0.9rem; font-weight: bold; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
            </style>
        </head>
        <body>
            <header>
                <input type="text" id="searchBox" placeholder="Search any video or paste YouTube Link...">
                <button id="goBtn">Search</button>
            </header>
            <main>
                <div class="player-box" id="playerBox">
                    <div class="video-container">
                        <iframe id="mainPlayer" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    </div>
                    <div class="player-meta">
                        <div id="videoTitle" style="font-weight: bold; font-size: 1.1rem;">Loading...</div>
                        <div class="badge">🛡️ AdBlocker Active - Watching Any Video Safely</div>
                    </div>
                </div>
                <h3 id="sectionTitle">Trending Feed</h3>
                <div class="grid" id="videoGrid"></div>
            </main>
            <script>
                const searchBox = document.getElementById('searchBox');
                const goBtn = document.getElementById('goBtn');
                const videoGrid = document.getElementById('videoGrid');
                const playerBox = document.getElementById('playerBox');
                const mainPlayer = document.getElementById('mainPlayer');
                const videoTitle = document.getElementById('videoTitle');

                window.onload = () => { runSearch('New Music Mix 2026'); };
                goBtn.onclick = () => { processInput(searchBox.value); };
                searchBox.onkeypress = (e) => { if(e.key === 'Enter') processInput(searchBox.value); };

                function processInput(val) {
                    if(!val.trim()) return;
                    if(val.includes('youtube.com/') || val.includes('youtu.be/')) {
                        const id = extractId(val);
                        if(id) loadVideo(id, "Direct Loaded Stream");
                    } else {
                        runSearch(val);
                    }
                }

                function extractId(url) {
                    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    const match = url.match(regExp);
                    return (match && match[2].length == 11) ? match[2] : null;
                }

                async function runSearch(query) {
                    document.getElementById('sectionTitle').innerText = `Results for: ${query}`;
                    videoGrid.innerHTML = '<p style="padding:20px;">Fetching all matching videos...</p>';
                    try {
                        const res = await fetch(`https://tools.aimylogic.com/api/googlesearch/search?query=site:youtube.com/watch ${encodeURIComponent(query)}`);
                        const data = await res.json();
                        if(data && data.length > 0) render(data); else fallback();
                    } catch { fallback(); }
                }

                function render(items) {
                    videoGrid.innerHTML = '';
                    items.forEach(item => {
                        const id = extractId(item.url);
                        if(id) {
                            const div = document.createElement('div');
                            div.className = 'card';
                            div.onclick = () => loadVideo(id, item.title);
                            div.innerHTML = `
                                <img class="thumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
                                <div class="details">${item.title.replace(" - YouTube","")}</div>
                            `;
                            videoGrid.appendChild(div);
                        }
                    });
                }

                function loadVideo(id, title) {
                    window.scrollTo({top: 0, behavior: 'smooth'});
                    mainPlayer.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1&rel=0`;
                    videoTitle.innerText = title;
                    playerBox.style.display = 'block';
                }

                function fallback() {
                    render([
                        {url: 'https://youtube.com/watch?v=jfKfPfyJRdk', title: 'Lofi Girl Live Radio'},
                        {url: 'https://youtube.com/watch?v=tnkTuDgpH6w', title: 'Deep House Coding Beats'},
                        {url: 'https://youtube.com/watch?v=4xDzrJKXOOY', title: 'Relaxing 4K Nature Streams'}
                    ]);
                }
            </script>
        </body>
        </html>
        EOF

        # 3. Automatically generate MainActivity.java Wrapper
        cat << 'EOF' > app/src/main/java/com/adblock/ytapp/MainActivity.java
        package com.adblock.ytapp;
        import android.os.Bundle;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            private WebView webView;
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                webView = new WebView(this);
                WebSettings settings = webView.getSettings();
                settings.setJavaScriptEnabled(true);
                settings.setDomStorageEnabled(true);
                settings.setMediaPlaybackRequiresUserGesture(false);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
            @Override
            public void onBackPressed() {
                if (webView.canGoBack()) { webView.goBack(); } else { super.onBackPressed(); }
            }
        }
        EOF

        # 4. Automatically generate AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="AdBlockTube" android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true">
                <activity android:name="com.adblock.ytapp.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 5. Automatically generate Root build.gradle and Settings
        echo "include ':app'" > settings.gradle
        echo "android.useAndroidX=true" > gradle.properties

        # 6. Automatically generate App build.gradle Configuration
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace "com.adblock.ytapp"
            compileSdk 34
            defaultConfig {
                applicationId "com.adblock.ytapp"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
        }
        dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
        EOF

    # Fixes the deprecation & compiler invocation issue completely
    - name: Setup Gradle Build Environment
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: 🏗️ Compile and Build APK Package
      run: gradle assembleDebug

    - name: 📥 Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YouTube-AdBlocker-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
