name: Build Floating Dual Space App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Filesystem, Repositories & Properties
      run: |
        mkdir -p app/src/main/java/com/fastchat/dualspace/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':app'
        EOF

        # 3. Root build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        EOF

        # 4. Android Manifest with Correct Permissions & Application Theme
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.fastchat.dualspace">
            
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <uses-permission android:name="android.permission.INTERNET" />

            <application 
                android:label="Floating Dual Space" 
                android:theme="@style/Theme.MaterialComponents.Light.NoActionBar"
                android:hardwareAccelerated="true">
                
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name=".FloatingWindowService" android:exported="false" />

            </application>
        </manifest>
        EOF

        # 5. MainActivity (Starts Service safely)
        cat << 'EOF' > app/src/main/java/com/fastchat/dualspace/MainActivity.java
        package com.fastchat.dualspace;

        import android.content.Intent;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.provider.Settings;
        import android.view.Gravity;
        import android.widget.Button;
        import android.widget.LinearLayout;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            private static final int OVERLAY_PERMISSION_REQ_CODE = 1234;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                LinearLayout layout = new LinearLayout(this);
                layout.setOrientation(LinearLayout.VERTICAL);
                layout.setGravity(Gravity.CENTER);

                Button btnStart = new Button(this);
                btnStart.setText("Launch Floating Browser Space");
                layout.addView(btnStart);
                
                setContentView(layout);

                btnStart.setOnClickListener(v -> {
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) {
                        Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                Uri.parse("package:" + getPackageName()));
                        startActivityForResult(intent, OVERLAY_PERMISSION_REQ_CODE);
                    } else {
                        startFloatingSpace();
                    }
                });
            }

            private void startFloatingSpace() {
                startService(new Intent(MainActivity.this, FloatingWindowService.class));
                finish(); 
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == OVERLAY_PERMISSION_REQ_CODE) {
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && Settings.canDrawOverlays(this)) {
                        startFloatingSpace();
                    } else {
                        Toast.makeText(this, "Permission required for floating system!", Toast.LENGTH_SHORT).show();
                    }
                }
            }
        }
        EOF

        # 6. Floating Window Service (Pure Programmatic View Generation - Crash Proof)
        cat << 'EOF' > app/src/main/java/com/fastchat/dualspace/FloatingWindowService.java
        package com.fastchat.dualspace;

        import android.app.Service;
        import android.content.Context;
        import android.content.Intent;
        import android.graphics.Color;
        import android.graphics.PixelFormat;
        import android.os.Build;
        import android.os.IBinder;
        import android.view.Gravity;
        import android.view.MotionEvent;
        import android.view.View;
        import android.view.WindowManager;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.widget.Button;
        import android.widget.LinearLayout;

        public class FloatingWindowService extends Service {
            private WindowManager mWindowManager;
            private LinearLayout mFloatingView;

            @Override
            public IBinder onBind(Intent intent) {
                return null;
            }

            @Override
            public void onCreate() {
                super.onCreate();
                mWindowManager = (WindowManager) getSystemService(WINDOW_SERVICE);

                // Pure Java Context Wrapper Architecture to totally bypass Layout XML inflation crashes
                Context context = getApplicationContext();
                mFloatingView = new LinearLayout(context);
                mFloatingView.setOrientation(LinearLayout.VERTICAL);
                mFloatingView.setBackgroundColor(Color.parseColor("#222222"));

                // 1. Header Layout (Drag Bar)
                LinearLayout header = new LinearLayout(context);
                header.setOrientation(LinearLayout.HORIZONTAL);
                header.setBackgroundColor(Color.parseColor("#333333"));
                header.setPadding(10, 10, 10, 10);
                
                LinearLayout.LayoutParams headerParams = new LinearLayout.LayoutParams(
                        LinearLayout.LayoutParams.MATCH_PARENT, 90);
                header.setLayoutParams(headerParams);

                // Empty space to push close button to right side
                View spacer = new View(context);
                LinearLayout.LayoutParams spacerParams = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, 1.0f);
                spacer.setLayoutParams(spacerParams);
                header.addView(spacer);

                // Close Button
                Button btnClose = new Button(context);
                btnClose.setText("X");
                btnClose.setTextColor(Color.WHITE);
                btnClose.setBackgroundColor(Color.RED);
                LinearLayout.LayoutParams btnParams = new LinearLayout.LayoutParams(100, LinearLayout.LayoutParams.MATCH_PARENT);
                btnClose.setLayoutParams(btnParams);
                header.addView(btnClose);

                mFloatingView.addView(header);

                // 2. Crash-Proof WebView Layer setup
                WebView webView = new WebView(context);
                LinearLayout.LayoutParams webParams = new LinearLayout.LayoutParams(
                        LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.MATCH_PARENT);
                webView.setLayoutParams(webParams);
                webView.setWebViewClient(new WebViewClient());
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.loadUrl("https://www.google.com");

                mFloatingView.addView(webView);

                // 3. Window Manager System Overlay flags assignment
                int layoutFlag;
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    layoutFlag = WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY;
                } else {
                    layoutFlag = WindowManager.LayoutParams.TYPE_PHONE;
                }

                final WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                        800,
                        1100,
                        layoutFlag,
                        WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                        PixelFormat.TRANSLUCENT);

                params.gravity = Gravity.TOP | Gravity.START;
                params.x = 100;
                params.y = 100;

                // Close action execution
                btnClose.setOnClickListener(v -> stopSelf());

                // Touch listener configuration for perfect moving functionality
                header.setOnTouchListener(new View.OnTouchListener() {
                    private int initialX;
                    private int initialY;
                    private float initialTouchX;
                    private float initialTouchY;

                    @Override
                    public boolean onTouch(View v, MotionEvent event) {
                        switch (event.getAction()) {
                            case MotionEvent.ACTION_DOWN:
                                initialX = params.x;
                                initialY = params.y;
                                initialTouchX = event.getRawX();
                                initialTouchY = event.getRawY();
                                return true;
                            case MotionEvent.ACTION_MOVE:
                                params.x = initialX + (int) (event.getRawX() - initialTouchX);
                                params.y = initialY + (int) (event.getRawY() - initialTouchY);
                                mWindowManager.updateViewLayout(mFloatingView, params);
                                return true;
                        }
                        return false;
                    }
                });

                mWindowManager.addView(mFloatingView, params);
            }

            @Override
            public void onDestroy() {
                super.onDestroy();
                if (mFloatingView != null) {
                    mWindowManager.removeView(mFloatingView);
                }
            }
        }
        EOF

        # 7. Material Themes configuration
        cat << 'EOF' > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.MaterialComponents.Light.NoActionBar" parent="Theme.MaterialComponents.Light.NoActionBar">
                <item name="colorPrimary">#6200EE</item>
                <item name="colorPrimaryDark">#3700B3</item>
                <item name="colorAccent">#03DAC6</item>
            </style>
        </resources>
        EOF

        # 8. App-Level build.gradle with Material Design elements
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.fastchat.dualspace'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.dualspace'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: 🏗️ Build Fixed Floating App
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Stable-Floating-Space
        path: app/build/outputs/apk/debug/app-debug.apk
