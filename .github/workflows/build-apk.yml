name: Build Junior AI Assistant APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Auto-Generate Junior Assistant Project
      run: |
        echo "Creating structures..."
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/java/com/ai/junior/

        # 1. Main App UI Layout (Status Indicator & Setup Guide)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="#0A0E17"
            android:padding="24dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🤖 JUNIOR AI ASSISTANT"
                android:textColor="#00E5FF"
                android:textSize="24sp"
                android:textStyle="bold"
                android:layout_marginBottom="25dp"/>

            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="Activation Guide:\n\n1. Click the button below to grant Audio/Microphone permissions.\n2. Allow 'Modify System Settings' if requested.\n3. Junior will now run in the background.\n4. Just say 'Junior' loudly, it will reply 'Yes Sir!' and wait for your next command!"
                android:textColor="#B0BEC5"
                android:textSize="15sp"
                android:lineSpacingExtra="6dp"
                android:layout_marginBottom="40dp"/>

            <Button
                android:id="@+id/btnInitialize"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:text="🔥 Wake Up Junior"
                android:backgroundTint="#00E5FF"
                android:textColor="#0A0E17"
                android:textStyle="bold"
                android:textSize="16sp"/>
        </LinearLayout>
        EOF

        # 2. String Resources
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Junior AI</string>
        </resources>
        EOF

        echo '<resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

        # 3. Main Configuration Entrypoint
        cat << 'EOF' > app/src/main/java/com/ai/junior/MainActivity.java
        package com.ai.junior;

        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.provider.Settings;
        import android.widget.Button;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                Button initBtn = findViewById(R.id.btnInitialize);
                initBtn.setOnClickListener(v -> {
                    // Check Microphone/Audio Recording Permissions
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 201);
                    } else if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.System.canWrite(this)) {
                        // Request Permission to modify Brightness settings safely
                        Intent intent = new Intent(Settings.ACTION_MANAGE_WRITE_SETTINGS);
                        intent.setData(Uri.parse("package:" + getPackageName()));
                        startActivity(intent);
                        Toast.makeText(this, "Allow Write Settings for Brightness Control", Toast.LENGTH_LONG).show();
                    } else {
                        // Start Core Background Assistant Service Engine
                        Intent serviceIntent = new Intent(this, JuniorAssistantService.class);
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                            startForegroundService(serviceIntent);
                        } else {
                            startService(serviceIntent);
                        }
                        Toast.makeText(this, "Junior Assistant Activated in Background!", Toast.LENGTH_SHORT).show();
                    }
                });
            }
        }
        EOF

        # 4. Core Assistant Background Processor & Voice Action Dispatcher
        cat << 'EOF' > app/src/main/java/com/ai/junior/JuniorAssistantService.java
        package com.ai.junior;

        import android.app.Notification;
        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.app.Service;
        import android.content.Context;
        import android.content.Intent;
        import android.media.AudioManager;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.os.IBinder;
        import android.provider.Settings;
        import android.speech.RecognitionListener;
        import android.speech.RecognizerIntent;
        import android.speech.SpeechRecognizer;
        import android.speech.tts.TextToSpeech;
        import android.widget.Toast;
        import java.util.ArrayList;
        import java.util.Locale;

        public class JuniorAssistantService extends Service implements TextToSpeech.OnInitListener {
            private SpeechRecognizer speechRecognizer;
            private Intent recognizerIntent;
            private TextToSpeech tts;
            private AudioManager audioManager;
            private boolean isJuniorWakened = false;

            @Override
            public void onCreate() {
                super.onCreate();
                audioManager = (AudioManager) getSystemService(Context.AUDIO_SERVICE);
                tts = new TextToSpeech(this, this);

                // Setup Continuous Background Listener Engine
                speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                recognizerIntent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                recognizerIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                recognizerIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault());

                setupListener();
            }

            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                // Keep Service Alive globally via standard Foreground Notification Channel
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    NotificationChannel channel = new NotificationChannel("junior_channel", "Junior AI Active", NotificationManager.IMPORTANCE_LOW);
                    getSystemService(NotificationManager.class).createNotificationChannel(channel);
                    Notification notification = new Notification.Builder(this, "junior_channel")
                            .setContentTitle("Junior AI Assistant")
                            .setContentText("Listening for 'Junior' trigger command...")
                            .setSmallIcon(android.R.drawable.ic_btn_speak_now)
                            .build();
                    startForeground(1, notification);
                }
                
                startListeningLoop();
                return START_STICKY;
            }

            private void startListeningLoop() {
                if (speechRecognizer != null) {
                    speechRecognizer.startListening(recognizerIntent);
                }
            }

            private void setupListener() {
                speechRecognizer.setRecognitionListener(new RecognitionListener() {
                    @Override
                    public void onResults(Bundle results) {
                        ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                        if (matches != null && !matches.isEmpty()) {
                            String command = matches.get(0).toLowerCase();

                            if (!isJuniorWakened) {
                                // Checking for Wake Up Trigger Name
                                if (command.contains("junior")) {
                                    isJuniorWakened = true;
                                    speak("Yes Sir!");
                                    Toast.makeText(JuniorAssistantService.this, "Junior: Yes Sir!", Toast.LENGTH_SHORT).show();
                                }
                            } else {
                                // Junior is already awake, execute system operations!
                                executeCommand(command);
                                isJuniorWakened = false; // Reset to listen for next execution
                            }
                        }
                        startListeningLoop(); // Continue scanning background frequencies
                    }

                    @Override
                    public void onError(int error) { startListeningLoop(); }
                    @Override public void onReadyForSpeech(Bundle params) {}
                    @Override public void onBeginningOfSpeech() {}
                    @Override public void onRmsChanged(float rmsdB) {}
                    @Override public void onBufferReceived(byte[] buffer) {}
                    @Override public void onEndOfSpeech() {}
                    @Override public void onPartialResults(Bundle partialResults) {}
                    @Override public void onEvent(int eventType, Bundle params) {}
                });
            }

            private void executeCommand(String speech) {
                // 1. YouTube Request Automation
                if (speech.contains("youtube") || speech.contains("play")) {
                    String query = speech.replace("junior", "").replace("youtube", "").replace("play", "").trim();
                    Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://www.youtube.com/results?search_query=" + query));
                    intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                    startActivity(intent);
                    speak("Opening YouTube for " + query);
                }
                // 2. Google Search Automation
                else if (speech.contains("google") || speech.contains("search")) {
                    String query = speech.replace("junior", "").replace("google", "").replace("search", "").trim();
                    Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://www.google.com/search?q=" + query));
                    intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                    startActivity(intent);
                    speak("Searching Google for " + query);
                }
                // 3. Audio Volume Configuration Management ("volume ko 30 kardo")
                else if (speech.contains("volume") || speech.contains("sound")) {
                    int targetVolume = extractNumber(speech);
                    if (targetVolume >= 0) {
                        int maxVol = audioManager.getStreamMaxVolume(AudioManager.STREAM_MUSIC);
                        int targetIndex = (targetVolume * maxVol) / 100; // Translate percentage to system index bounds
                        audioManager.setStreamVolume(AudioManager.STREAM_MUSIC, targetIndex, AudioManager.FLAG_SHOW_UI);
                        speak("Setting media volume to " + targetVolume + " percent");
                    }
                }
                // 4. Screen Brightness Matrix Control ("brightness 50 percent kardo")
                else if (speech.contains("brightness") || speech.contains("light")) {
                    int targetBrightness = extractNumber(speech);
                    if (targetBrightness >= 0) {
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && Settings.System.canWrite(this)) {
                            int actualVal = (targetBrightness * 255) / 100; // System takes absolute integer up to 255
                            Settings.System.putInt(getContentResolver(), Settings.System.SCREEN_BRIGHTNESS_MODE, Settings.System.SCREEN_BRIGHTNESS_MODE_MANUAL);
                            Settings.System.putInt(getContentResolver(), Settings.System.SCREEN_BRIGHTNESS, actualVal);
                            speak("Setting device screen brightness to " + targetBrightness + " percent");
                        } else {
                            speak("Please authorize write settings permission first.");
                        }
                    }
                } else {
                    speak("I am on it, Sir.");
                }
            }

            private int extractNumber(String text) {
                // Regex scanner to instantly parse digit arrays inside user speech structures
                String clean = text.replaceAll("[^0-9]", "");
                try {
                    return Integer.parseInt(clean);
                } catch (Exception e) {
                    return -1;
                }
            }

            private void speak(String text) {
                if (tts != null) {
                    tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "junior_tts");
                }
            }

            @Override
            public void onInit(int status) {
                if (status == TextToSpeech.SUCCESS) {
                    tts.setLanguage(Locale.getDefault());
                }
            }

            @Override
            public IBinder onBind(Intent intent) { return null; }

            @Override
            public void onDestroy() {
                super.onDestroy();
                if (speechRecognizer != null) {
                    speechRecognizer.destroy();
                }
                if (tts != null) {
                    tts.stop();
                    tts.shutdown();
                }
            }
        }
        EOF

        # 5. Application Android Manifest Configuration
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
            <uses-permission android:name="android.permission.WRITE_SETTINGS" xmlns:tools="http://schemas.android.com/tools" tools:ignore="ProtectedPermissions" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            
            <application android:label="Junior AI" android:theme="@style/Theme.App">
                
                <activity android:name="com.ai.junior.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name="com.ai.junior.JuniorAssistantService" android:exported="false" />

            </application>
        </manifest>
        EOF

        # 6. Root Configuration Environment Architectures
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.useAndroidX=true" > gradle.properties

        # 7. Application Module Rules
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace "com.ai.junior"
            compileSdk 34
            defaultConfig {
                applicationId "com.ai.junior"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: Setup Gradle System
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: 🏗️ Compile and Pack Junior Assistant APK
      run: gradle assembleDebug

    - name: 📥 Deliver Assistant Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Junior-AI-Assistant
        path: app/build/outputs/apk/debug/app-debug.apk
