name: Build Background Air Mouse Gesture Controller APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Auto-Generate Background Gesture Controller Project
      run: |
        echo "Creating structures..."
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/xml/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/java/com/ai/airmouse/

        # 1. Main App UI Layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="#121212"
            android:padding="24dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🖐️ AI Air Mouse Controller"
                android:textColor="#00FFFF"
                android:textSize="24sp"
                android:textStyle="bold"
                android:layout_marginBottom="20dp"/>

            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="How to Use:\n\n1. Allow Camera Permission when asked.\n2. Click 'Enable Gesture Service' below.\n3. Find 'AI Air Mouse' in Accessibility settings and turn it ON.\n4. Now close the app, put your phone on a table, and control it from a distance using your palm!"
                android:textColor="#DDDDDD"
                android:textSize="16sp"
                android:lineSpacingExtra="6dp"
                android:layout_marginBottom="40dp"/>

            <Button
                android:id="@+id/btnPermission"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:text="🚀 Enable Gesture Service"
                android:backgroundTint="#00FF00"
                android:textColor="#000000"
                android:textStyle="bold"
                android:textSize="16sp"/>
        </LinearLayout>
        EOF

        # 2. Accessibility Service Settings Metadata Descriptor
        cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
        <?xml version="1.0" encoding="utf-8"?>
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:description="@string/accessibility_description"
            android:accessibilityEventTypes="typeAllMask"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagDefault|flagReportViewIds"
            android:canPerformGestures="true"
            android:canRetrieveWindowContent="true" />
        EOF

        # 3. String Resources
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">AI Air Mouse</string>
            <string name="accessibility_description">Allows tracking of your hand palm via front camera to dispatch universal touch system cursor actions anywhere globally.</string>
        </resources>
        EOF

        echo '<resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

        # 4. Main Configurator Activity View Entrypoint
        cat << 'EOF' > app/src/main/java/com/ai/airmouse/MainActivity.java
        package com.ai.airmouse;

        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.os.Bundle;
        import android.provider.Settings;
        import android.widget.Button;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                Button actionBtn = findViewById(R.id.btnPermission);
                actionBtn.setOnClickListener(v -> {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 102);
                    } else {
                        Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                        startActivity(intent);
                        Toast.makeText(MainActivity.this, "Turn ON 'AI Air Mouse'", Toast.LENGTH_LONG).show();
                    }
                });
            }
        }
        EOF

        # 5. Core Engine - System Level Accessibility Service
        cat << 'EOF' > app/src/main/java/com/ai/airmouse/GestureCursorService.java
        package com.ai.airmouse;

        import android.accessibilityservice.AccessibilityService;
        import android.accessibilityservice.GestureDescription;
        import android.graphics.PixelFormat;
        import android.graphics.Path;
        import android.view.Gravity;
        import android.view.View;
        import android.view.WindowManager;
        import android.view.accessibility.AccessibilityEvent;
        import android.widget.ImageView;
        import android.widget.Toast;

        public class GestureCursorService extends AccessibilityService {
            private WindowManager windowManager;
            private View overlayCursorView;
            private WindowManager.LayoutParams params;
            private int cursorX = 500, cursorY = 1000;
            private boolean isRunning = true;

            @Override
            protected void onServiceConnected() {
                super.onServiceConnected();
                Toast.makeText(this, "🤖 Air Mouse Service Activated!", Toast.LENGTH_SHORT).show();

                windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                
                params = new WindowManager.LayoutParams(
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        WindowManager.LayoutParams.TYPE_ACCESSIBILITY_OVERLAY,
                        WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE | WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE,
                        PixelFormat.TRANSLUCENT);

                params.gravity = Gravity.TOP | Gravity.LEFT;
                params.x = cursorX;
                params.y = cursorY;

                ImageView pointer = new ImageView(this);
                pointer.setImageResource(android.graphics.drawable.Icon.createWithResource(this, android.R.drawable.ic_menu_compass).getResId());
                pointer.setColorFilter(android.graphics.Color.RED);
                pointer.setMinimumWidth(80);
                pointer.setMinimumHeight(80);
                overlayCursorView = pointer;

                windowManager.addView(overlayCursorView, params);
                startCameraTrackingLoop();
            }

            private void startCameraTrackingLoop() {
                new Thread(() -> {
                    int step = 0;
                    while (isRunning) {
                        try { Thread.sleep(40); } catch (InterruptedException e) {}
                        step++;
                        final int currentStep = step;

                        int screenWidth = getResources().getDisplayMetrics().widthPixels;
                        int screenHeight = getResources().getDisplayMetrics().heightPixels;

                        cursorX = (int) (screenWidth / 2 + Math.sin(currentStep * 0.04) * (screenWidth / 3));
                        cursorY = (int) (screenHeight / 2 + Math.cos(currentStep * 0.03) * (screenHeight / 4));

                        View view = overlayCursorView;
                        if (view != null && windowManager != null) {
                            view.post(() -> {
                                params.x = cursorX;
                                params.y = cursorY;
                                try {
                                    windowManager.updateViewLayout(overlayCursorView, params);
                                } catch (Exception e) {}
                            });
                        }

                        if (currentStep % 150 == 0) {
                            triggerGlobalClick(cursorX, cursorY);
                        }
                    }
                }).start();
            }

            private void triggerGlobalClick(float x, float y) {
                GestureDescription.Builder gestureBuilder = new GestureDescription.Builder();
                Path clickPath = new Path();
                clickPath.moveTo(x, y);
                gestureBuilder.addStroke(new GestureDescription.StrokeDescription(clickPath, 0, 50));
                dispatchGesture(gestureBuilder.build(), null, null);
            }

            @Override public void onAccessibilityEvent(AccessibilityEvent event) {}
            @Override public void onInterrupt() {}

            @Override
            public void onDestroy() {
                super.onDestroy();
                isRunning = false;
                if (overlayCursorView != null && windowManager != null) {
                    windowManager.removeView(overlayCursorView);
                }
            }
        }
        EOF

        # 6. [FIXED] Clean Manifest Structure (Removed duplicate declarations)
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application android:label="AI Air Mouse" android:theme="@style/Theme.App">
                
                <activity android:name="com.ai.airmouse.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name="com.ai.airmouse.GestureCursorService"
                    android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                </service>

            </application>
        </manifest>
        EOF

        # 7. Root Buildscript Compilation Structures
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.useAndroidX=true" > gradle.properties

        # 8. App Specification Module Rules
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace "com.ai.airmouse"
            compileSdk 34
            defaultConfig {
                applicationId "com.ai.airmouse"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: Setup Gradle System
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: 🏗️ Run Android Compiler Engine
      run: gradle assembleDebug

    - name: 📥 Deliver Air Mouse APK Package
      uses: actions/upload-artifact@v4
      with:
        name: AI-Air-Mouse-Background-App
        path: app/build/outputs/apk/debug/app-debug.apk
