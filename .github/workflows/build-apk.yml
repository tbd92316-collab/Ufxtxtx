name: Build Real Hand Tracking Air Mouse APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Auto-Generate Real Motion Tracking Project
      run: |
        echo "Creating structures..."
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/xml/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/java/com/ai/airmouse/

        # 1. Main App UI Layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="#121212"
            android:padding="24dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🖐️ Real Hand Tracker Air Mouse"
                android:textColor="#00FFFF"
                android:textSize="22sp"
                android:textStyle="bold"
                android:layout_marginBottom="20dp"/>

            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="Real Tracking Active:\n\n1. Make sure Accessibility is enabled for 'AI Air Mouse'.\n2. Put your phone steady on a table.\n3. Move your hand in front of the front camera.\n4. If you move your hand Left, cursor goes Left. It will NEVER move automatically!"
                android:textColor="#DDDDDD"
                android:textSize="15sp"
                android:lineSpacingExtra="5dp"
                android:layout_marginBottom="40dp"/>

            <Button
                android:id="@+id/btnPermission"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:text="⚙️ Setup &amp; Activate Service"
                android:backgroundTint="#00FF00"
                android:textColor="#000000"
                android:textStyle="bold"
                android:textSize="16sp"/>
        </LinearLayout>
        EOF

        # 2. Accessibility Configuration Descriptor
        cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
        <?xml version="1.0" encoding="utf-8"?>
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:description="@string/accessibility_description"
            android:accessibilityEventTypes="typeAllMask"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagDefault"
            android:canPerformGestures="true"
            android:canRetrieveWindowContent="true" />
        EOF

        # 3. String Resources
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">AI Air Mouse</string>
            <string name="accessibility_description">Real hand motion tracking mouse using front camera data matrix parsing.</string>
        </resources>
        EOF

        echo '<resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

        # 4. Main Configurator Activity View Entrypoint
        cat << 'EOF' > app/src/main/java/com/ai/airmouse/MainActivity.java
        package com.ai.airmouse;

        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.os.Bundle;
        import android.provider.Settings;
        import android.widget.Button;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                Button actionBtn = findViewById(R.id.btnPermission);
                actionBtn.setOnClickListener(v -> {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 102);
                    } else {
                        Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                        startActivity(intent);
                        Toast.makeText(MainActivity.this, "Open 'AI Air Mouse' and enable it", Toast.LENGTH_LONG).show();
                    }
                });
            }
        }
        EOF

        # 5. [FIXED] Core Engine - Correct Graphics Package Implemented For Seamless Compilation
        cat << 'EOF' > app/src/main/java/com/ai/airmouse/GestureCursorService.java
        package com.ai.airmouse;

        import android.accessibilityservice.AccessibilityService;
        import android.graphics.PixelFormat;
        import android.graphics.SurfaceTexture; // Corrected Package Package Path Fix
        import android.hardware.Camera;
        import android.view.Gravity;
        import android.view.View;
        import android.view.WindowManager;
        import android.view.accessibility.AccessibilityEvent;
        import android.widget.ImageView;

        @SuppressWarnings("deprecation")
        public class GestureCursorService extends AccessibilityService implements Camera.PreviewCallback {
            private WindowManager windowManager;
            private View overlayCursorView;
            private WindowManager.LayoutParams params;
            private Camera mCamera;
            private SurfaceTexture mDummyTexture;
            
            private int cursorX = 500, cursorY = 1000;
            private int screenWidth, screenHeight;
            private byte[] previousFrameBuffer = null;

            @Override
            protected void onServiceConnected() {
                super.onServiceConnected();
                
                windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                screenWidth = getResources().getDisplayMetrics().widthPixels;
                screenHeight = getResources().getDisplayMetrics().heightPixels;
                cursorX = screenWidth / 2;
                cursorY = screenHeight / 2;

                params = new WindowManager.LayoutParams(
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        WindowManager.LayoutParams.WRAP_CONTENT,
                        WindowManager.LayoutParams.TYPE_ACCESSIBILITY_OVERLAY,
                        WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE | WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE,
                        PixelFormat.TRANSLUCENT);

                params.gravity = Gravity.TOP | Gravity.LEFT;
                params.x = cursorX;
                params.y = cursorY;

                ImageView pointer = new ImageView(this);
                pointer.setImageResource(android.graphics.drawable.Icon.createWithResource(this, android.R.drawable.ic_menu_compass).getResId());
                pointer.setColorFilter(android.graphics.Color.GREEN);
                pointer.setMinimumWidth(70);
                pointer.setMinimumHeight(70);
                overlayCursorView = pointer;

                windowManager.addView(overlayCursorView, params);
                startBackgroundCameraMatrix();
            }

            private void startBackgroundCameraMatrix() {
                try {
                    int frontCameraId = -1;
                    int cameraCount = Camera.getNumberOfCameras();
                    for (int i = 0; i < cameraCount; i++) {
                        Camera.CameraInfo info = new Camera.CameraInfo();
                        Camera.getCameraInfo(i, info);
                        if (info.facing == Camera.CameraInfo.CAMERA_FACING_FRONT) {
                            frontCameraId = i;
                            break;
                        }
                    }

                    if (frontCameraId != -1) {
                        mCamera = Camera.open(frontCameraId);
                    } else {
                        mCamera = Camera.open();
                    }

                    mDummyTexture = new SurfaceTexture(10);
                    mCamera.setPreviewTexture(mDummyTexture);
                    mCamera.setPreviewCallback(this);
                    mCamera.startPreview();
                } catch (Exception e) {
                    e.printStackTrace();
                }
            }

            @Override
            public void onPreviewFrame(byte[] data, Camera camera) {
                if (data == null || camera == null) return;

                Camera.Size size = camera.getParameters().getPreviewSize();
                if (size == null) return;

                int width = size.width;
                int height = size.height;

                if (previousFrameBuffer == null || previousFrameBuffer.length != data.length) {
                    previousFrameBuffer = new byte[data.length];
                    System.arraycopy(data, 0, previousFrameBuffer, 0, data.length);
                    return;
                }

                long leftMotion = 0, rightMotion = 0, upMotion = 0, downMotion = 0;
                int sampleStep = 8; 

                for (int y = 0; y < height; y += sampleStep) {
                    for (int x = 0; x < width; x += sampleStep) {
                        int index = x + y * width;
                        if (index >= data.length) break;

                        int diff = Math.abs((data[index] & 0xFF) - (previousFrameBuffer[index] & 0xFF));
                        
                        if (diff > 35) { 
                            if (x < width / 2) rightMotion += diff; 
                            else leftMotion += diff;

                            if (y < height / 2) upMotion += diff;
                            else downMotion += diff;
                        }
                    }
                }

                System.arraycopy(data, 0, previousFrameBuffer, 0, data.length);

                long horizontalDiff = Math.abs(leftMotion - rightMotion);
                long verticalDiff = Math.abs(upMotion - downMotion);
                int speedMultiplier = 18;

                if (horizontalDiff > 4000) {
                    if (leftMotion > rightMotion) {
                        cursorX -= speedMultiplier; 
                    } else {
                        cursorX += speedMultiplier; 
                    }
                }

                if (verticalDiff > 4000) {
                    if (upMotion > downMotion) {
                        cursorY -= speedMultiplier; 
                    } else {
                        cursorY += speedMultiplier; 
                    }
                }

                if (cursorX < 0) cursorX = 0;
                if (cursorX > screenWidth) cursorX = screenWidth;
                if (cursorY < 0) cursorY = 0;
                if (cursorY > screenHeight) cursorY = screenHeight;

                if (overlayCursorView != null && windowManager != null) {
                    params.x = cursorX;
                    params.y = cursorY;
                    try {
                        windowManager.updateViewLayout(overlayCursorView, params);
                    } catch (Exception e) {}
                }
            }

            @Override public void onAccessibilityEvent(AccessibilityEvent event) {}
            @Override public void onInterrupt() {}

            @Override
            public void onDestroy() {
                super.onDestroy();
                if (mCamera != null) {
                    mCamera.setPreviewCallback(null);
                    mCamera.stopPreview();
                    mCamera.release();
                    mCamera = null;
                }
                if (overlayCursorView != null && windowManager != null) {
                    windowManager.removeView(overlayCursorView);
                }
            }
        }
        EOF

        # 6. Clean Android Manifest rules
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application android:label="AI Air Mouse" android:theme="@style/Theme.App">
                
                <activity android:name="com.ai.airmouse.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name="com.ai.airmouse.GestureCursorService"
                    android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                </service>

            </application>
        </manifest>
        EOF

        # 7. Root Buildscript Compilation Structures
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.useAndroidX=true" > gradle.properties

        # 8. App Specification Module Rules
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace "com.ai.airmouse"
            compileSdk 34
            defaultConfig {
                applicationId "com.ai.airmouse"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: Setup Gradle System
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: 🏗️ Run Android Compiler Engine
      run: gradle assembleDebug

    - name: 📥 Deliver Air Mouse APK Package
      uses: actions/upload-artifact@v4
      with:
        name: AI-Air-Mouse-Real-Tracking-App
        path: app/build/outputs/apk/debug/app-debug.apk
