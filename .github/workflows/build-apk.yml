name: Build Custom ABCDE System Keyboard APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Auto-Generate System Alphabetical Keyboard Project
      run: |
        echo "Creating structures..."
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/xml/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/java/com/custom/keyboard/

        # 1. Generate XML Layout for the Keyboard Viewer Component
        cat << 'EOF' > app/src/main/res/layout/keyboard_view.xml
        <?xml version="1.0" encoding="utf-8"?>
        <android.inputmethodservice.KeyboardView 
            xmlns:android="http://schemas.android.com/apk/res/android"
            android:id="@+id/keyboard_view"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:layout_alignParentBottom="true"
            android:keyBackground="@android:drawable/btn_default"
            android:keyTextColor="#FFFFFF"
            android:background="#1A1A1A"
            android:padding="4dp"/>
        EOF

        # 2. [CRITICAL] Create the Alphabetical (A-Z) Key Matrix Structure
        cat << 'EOF' > app/src/main/res/xml/alphabet_layout.xml
        <?xml version="1.0" encoding="utf-8"?>
        <Keyboard xmlns:android="http://schemas.android.com/apk/res/android"
            android:keyWidth="14%p"
            android:keyHeight="55dp"
            android:horizontalGap="1%p"
            android:verticalGap="6dp">

            <Row>
                <Key android:codes="97" android:keyLabel="a" />
                <Key android:codes="98" android:keyLabel="b" />
                <Key android:codes="99" android:keyLabel="c" />
                <Key android:codes="100" android:keyLabel="d" />
                <Key android:codes="101" android:keyLabel="e" />
                <Key android:codes="102" android:keyLabel="f" />
                <Key android:codes="103" android:keyLabel="g" />
            </Row>

            <Row>
                <Key android:codes="104" android:keyLabel="h" />
                <Key android:codes="105" android:keyLabel="i" />
                <Key android:codes="106" android:keyLabel="j" />
                <Key android:codes="107" android:keyLabel="k" />
                <Key android:codes="108" android:keyLabel="l" />
                <Key android:codes="109" android:keyLabel="m" />
                <Key android:codes="110" android:keyLabel="n" />
            </Row>

            <Row>
                <Key android:codes="111" android:keyLabel="o" />
                <Key android:codes="112" android:keyLabel="p" />
                <Key android:codes="113" android:keyLabel="q" />
                <Key android:codes="114" android:keyLabel="r" />
                <Key android:codes="115" android:keyLabel="s" />
                <Key android:codes="116" android:keyLabel="t" />
                <Key android:codes="117" android:keyLabel="u" />
            </Row>

            <Row>
                <Key android:codes="118" android:keyLabel="v" />
                <Key android:codes="119" android:keyLabel="w" />
                <Key android:codes="120" android:keyLabel="x" />
                <Key android:codes="121" android:keyLabel="y" />
                <Key android:codes="122" android:keyLabel="z" />
                <Key android:codes="-5" android:keyLabel="DEL" android:keyWidth="29%p" />
            </Row>

            <Row>
                <Key android:codes="32" android:keyLabel="SPACE" android:keyWidth="69%p" />
                <Key android:codes="10" android:keyLabel="ENTER" android:keyWidth="29%p" />
            </Row>
        </Keyboard>
        EOF

        # 3. Method Subtype Configuration xml file
        cat << 'EOF' > app/src/main/res/xml/method.xml
        <?xml version="1.0" encoding="utf-8"?>
        <input-method xmlns:android="http://schemas.android.com/apk/res/android">
            <subtype
                android:label="ABCDE Simple Layout"
                android:imeSubtypeLocale="en_US"
                android:imeSubtypeMode="keyboard" />
        </input-method>
        EOF

        # 4. Main Settings Setup Activity UI (Instructions to enable keyboard)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="#121212"
            android:padding="20dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🔤 ABCDE Custom System Keyboard"
                android:textColor="#FFFFFF"
                android:textSize="20sp"
                android:textStyle="bold"
                android:layout_marginBottom="30dp"/>

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="How to Activate:\n\n1. Go to Phone Settings -> Languages &amp; Input.\n2. Click 'Manage Keyboards'.\n3. Turn on 'ABCDE Simple Keyboard'.\n4. Open any app (like WhatsApp) and select this keyboard!"
                android:textColor="#BBBBBB"
                android:textSize="15sp"
                android:lineSpacingExtra="5dp"
                android:layout_marginBottom="40dp"/>

            <EditText
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:hint="Tap here to test your new keyboard..."
                android:textColorHint="#555555"
                android:textColor="#FFFFFF"
                android:backgroundTint="#00FFFF"/>
        </LinearLayout>
        EOF

        echo '<resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

        # 5. Core App Main Interface Entrypoint Class
        cat << 'EOF' > app/src/main/java/com/custom/keyboard/MainActivity.class
        package com.custom.keyboard;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
            }
        }
        EOF
        mv app/src/main/java/com/custom/keyboard/MainActivity.class app/src/main/java/com/custom/keyboard/MainActivity.java

        # 6. Core Background Engine Service handling actual character outputs
        cat << 'EOF' > app/src/main/java/com/custom/keyboard/SimpleABCKeyboard.class
        package com.custom.keyboard;

        import android.inputmethodservice.InputMethodService;
        import android.inputmethodservice.Keyboard;
        import android.inputmethodservice.KeyboardView;
        import android.view.KeyEvent;
        import android.view.View;
        import android.view.inputmethod.InputConnection;

        public class SimpleABCKeyboard extends InputMethodService implements KeyboardView.OnKeyboardActionListener {
            private KeyboardView kv;
            private Keyboard keyboard;

            @Override
            public View onCreateInputView() {
                kv = (KeyboardView) getLayoutInflater().inflate(R.layout.keyboard_view, null);
                keyboard = new Keyboard(this, org.xmlpull.v1.XmlPullParser.class.hashCode() == 0 ? null : getResources().getXml(R.xml/alphabet_layout.xml));
                
                // Fallback direct parser initializer safely matching resource fields
                keyboard = new Keyboard(this, R.xml.alphabet_layout);
                kv.setKeyboard(keyboard);
                kv.setOnKeyboardActionListener(this);
                return kv;
            }

            @Override
            public void onKey(int primaryCode, int[] keyCodes) {
                InputConnection ic = getCurrentInputConnection();
                if (ic == null) return;

                switch (primaryCode) {
                    case Keyboard.KEYCODE_DELETE:
                        ic.deleteSurroundingText(1, 0);
                        break;
                    case 10: // Enter Key
                        ic.sendKeyEvent(new KeyEvent(KeyEvent.ACTION_DOWN, KeyEvent.KEYCODE_ENTER));
                        ic.sendKeyEvent(new KeyEvent(KeyEvent.ACTION_UP, KeyEvent.KEYCODE_ENTER));
                        break;
                    default:
                        char code = (char) primaryCode;
                        ic.commitText(String.valueOf(code), 1);
                }
            }

            @Override public void onPress(int primaryCode) {}
            @Override public void onRelease(int primaryCode) {}
            @Override public void onText(CharSequence text) {}
            @Override public void swipeLeft() {}
            @Override public void swipeRight() {}
            @Override public void swipeDown() {}
            @Override public void swipeUp() {}
        }
        EOF
        mv app/src/main/java/com/custom/keyboard/SimpleABCKeyboard.class app/src/main/java/com/custom/keyboard/SimpleABCKeyboard.java

        # 7. Package Android Manifest declaring Input Method System Rules
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="ABCDE Simple Keyboard" android:theme="@style/Theme.App">
                
                <activity android:name="com.custom.keyboard.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name="com.custom.keyboard.SimpleABCKeyboard"
                    android:permission="android.permission.BIND_INPUT_METHOD"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.view.InputMethod" />
                    </intent-filter>
                    <meta-data android:name="android.view.im" android:resource="@xml/method" />
                </service>

            </application>
        </manifest>
        EOF

        # 8. Root Buildscript Compilation Structures
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.useAndroidX=true" > gradle.properties

        # 9. App Specification Module Rules
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace "com.custom.keyboard"
            compileSdk 34
            defaultConfig {
                applicationId "com.custom.keyboard"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

    - name: Setup Gradle System
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: 🏗️ Run Android Compiler Engine
      run: gradle assembleDebug

    - name: 📥 Deliver Keyboard APK Package
      uses: actions/upload-artifact@v4
      with:
        name: Alphabetical-System-Keyboard-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
