name: Build AdBlocker VPN App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure
      run: |
        mkdir -p src/main/java/com/fastchat/adblock/
        mkdir -p src/main/res/layout/
        mkdir -p src/main/res/values/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "AdBlockVPN"
        EOF

        # 3. Build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2'
        }

        android {
            namespace 'com.fastchat.adblock'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.adblock'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 4. AndroidManifest.xml (Binds VpnService Permission)
        cat << 'EOF' > src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />

            <application
                android:label="🛡️ AdShield VPN"
                android:theme="@style/Theme.AppCompat.DayNight.NoActionBar"
                android:hardwareAccelerated="true">
                
                <activity android:name="com.fastchat.adblock.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service 
                    android:name="com.fastchat.adblock.AdBlockVpnService"
                    android:permission="android.permission.BIND_VPN_SERVICE"
                    android:exported="false">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>

            </application>
        </manifest>
        EOF

        # 5. UI Layout (activity_main.xml - Hacker Dark Look)
        cat << 'EOF' > src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#090d16"
            android:padding="24dp">

            <TextView
                android:id="@+id/txt_app_title"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🛡️ AdShield VPN"
                android:textColor="#ffffff"
                android:textSize="28sp"
                android:textStyle="bold"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="30dp"/>

            <TextView
                android:id="@+id/txt_vpn_status"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Status: Protection Disabled"
                android:textColor="#94a3b8"
                android:textSize="15sp"
                android:layout_below="@id/txt_app_title"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="8dp"/>

            <LinearLayout
                android:id="@+id/panel_info"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:background="#131c2e"
                android:padding="20dp"
                android:layout_below="@id/txt_vpn_status"
                android:layout_marginTop="40dp">

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="⚡ DNS Level Protection Active"
                    android:textColor="#38bdf8"
                    android:textStyle="bold"
                    android:textSize="14sp"/>

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="This local VPN routes requests through a secure Ad-Blocking DNS. No external servers used, keeping data completely private and fast."
                    android:textColor="#64748b"
                    android:textSize="12sp"
                    android:layout_marginTop="6dp"
                    android:lineSpacingExtra="3dp"/>
            </LinearLayout>

            <com.google.android.material.button.MaterialButton
                android:id="@+id/btn_vpn_toggle"
                android:layout_width="180dp"
                android:layout_height="180dp"
                android:layout_centerInParent="true"
                android:text="START"
                android:textSize="22sp"
                android:textStyle="bold"
                android:textColor="#ffffff"
                android:backgroundTint="#ef4444"
                android:insetTop="0dp"
                android:insetBottom="0dp"
                android:gravity="center"
                android:elevation="8dp"/>

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🔒 Local Loopback Secure Mode"
                android:textColor="#475569"
                android:textSize="12sp"
                android:layout_alignParentBottom="true"
                android:layout_centerHorizontal="true"
                android:layout_marginBottom="10dp"/>

        </RelativeLayout>
        EOF

        # 6. AdBlockVpnService.java (Core Ad-Blocking DNS Routing Architecture)
        cat << 'EOF' > src/main/java/com/fastchat/adblock/AdBlockVpnService.java
        package com.fastchat.adblock;

        import android.content.Intent;
        import android.net.VpnService;
        import android.os.ParcelFileDescriptor;

        public class AdBlockVpnService extends VpnService {
            private ParcelFileDescriptor vpnInterface = null;
            public static boolean isServiceRunning = false;

            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                if (intent != null && "STOP".equals(intent.getAction())) {
                    stopVpn();
                    return START_NOT_STICKY;
                }
                
                startVpn();
                return START_STICKY;
            }

            private void startVpn() {
                if (vpnInterface != null) return;

                try {
                    Builder builder = new Builder();
                    builder.setSession("AdShield VPN Engine");
                    
                    // Route basic safe IP pool range locally
                    builder.addAddress("10.0.0.1", 24);
                    builder.addRoute("0.0.0.0", 0);

                    // MAGIC STEP: High-Performance Public Ad-Blocking DNS Servers Integration
                    // Routes all requests through AdGuard/Mullvad DNS filtering pools directly
                    builder.addDnsServer("94.140.14.14"); // Primary AdGuard AdBlock DNS
                    builder.addDnsServer("94.140.15.15"); // Secondary AdGuard AdBlock DNS

                    if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.Q) {
                        builder.setMetered(false); // Keeps OS from throttling network speeds
                    }

                    vpnInterface = builder.establish();
                    isServiceRunning = true;
                } catch (Exception e) {
                    e.printStackTrace();
                    stopSelf();
                }
            }

            private void stopVpn() {
                try {
                    if (vpnInterface != null) {
                        vpnInterface.close();
                        vpnInterface = null;
                    }
                } catch (Exception e) {
                    e.printStackTrace();
                }
                isServiceRunning = false;
                stopSelf();
            }

            @Override
            public void onDestroy() {
                stopVpn();
                super.onDestroy();
            }
        }
        EOF

        # 7. MainActivity.java (Binds VPN Activation Intent Prompts Safely)
        cat << 'EOF' > src/main/java/com/fastchat/adblock/MainActivity.java
        package com.fastchat.adblock;

        import android.content.Intent;
        import android.net.VpnService;
        import android.os.Bundle;
        import android.view.View;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import com.google.android.material.button.MaterialButton;

        public class MainActivity extends AppCompatActivity {
            private static final int VPN_REQUEST_CODE = 707;
            private MaterialButton btnToggle;
            private TextView txtStatus;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                btnToggle = findViewById(R.id.btn_vpn_toggle);
                txtStatus = findViewById(R.id.txt_vpn_status);

                updateUI();

                btnToggle.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        if (!AdBlockVpnService.isServiceRunning) {
                            // Check system level VPN authorization status
                            Intent intent = VpnService.prepare(MainActivity.this);
                            if (intent != null) {
                                startActivityForResult(intent, VPN_REQUEST_CODE);
                            } else {
                                startVpnService();
                            }
                        } else {
                            stopVpnService();
                        }
                    }
                });
            }

            private void startVpnService() {
                Intent intent = new Intent(this, AdBlockVpnService.class);
                startService(intent);
                
                // Give OS half a second to initialize binder
                btnToggle.postDelayed(new Runnable() {
                    @Override
                    public void run() {
                        updateUI();
                    }
                }, 500);
            }

            private void stopVpnService() {
                Intent intent = new Intent(this, AdBlockVpnService.class);
                intent.setAction("STOP");
                startService(intent);
                
                btnToggle.postDelayed(new Runnable() {
                    @Override
                    public void run() {
                        updateUI();
                    }
                }, 500);
            }

            private void updateUI() {
                if (AdBlockVpnService.isServiceRunning) {
                    btnToggle.setText("STOP");
                    btnToggle.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xFF22C55E)); // Green Accent
                    txtStatus.setText("Status: Shield Active 🟢");
                    Toast.makeText(this, "Protection Live!", Toast.LENGTH_SHORT).show();
                } else {
                    btnToggle.setText("START");
                    btnToggle.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xFFEF4444)); // Red Accent
                    txtStatus.setText("Status: Protection Disabled");
                }
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == VPN_REQUEST_CODE && resultCode == RESULT_OK) {
                    startVpnService();
                } else {
                    Toast.makeText(this, "VPN Permission Denied!", Toast.LENGTH_SHORT).show();
                }
            }
        }
        EOF

        # 8. Standard Strings Resource
        cat << 'EOF' > src/main/res/values/strings.xml
        <resources><string name="app_name">AdShield VPN</string></resources>
        EOF

    - name: 🏗️ Create Gradle Wrapper & Run Build
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 🔍 Locate and Stage APK
      run: |
        mkdir -p final-apk/
        find . -name "*.apk" -exec cp {} final-apk/adshield-vpn.apk \;
        ls -la final-apk/

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: AdShield-VPN-Pack
        path: final-apk/adshield-vpn.apk
