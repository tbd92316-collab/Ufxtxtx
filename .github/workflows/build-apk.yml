name: Build Screen Recorder App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure & Permissions
      run: |
        mkdir -p src/main/java/com/fastchat/recorder/
        mkdir -p src/main/res/layout/
        mkdir -p src/main/res/values/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "ScreenRecorder"
        EOF

        # 3. Build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2'
        }

        android {
            namespace 'com.fastchat.recorder'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.recorder'
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 4. AndroidManifest.xml
        cat << 'EOF' > src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

            <application
                android:label="🎥 PlayRecorder Pro"
                android:theme="@style/Theme.AppCompat.DayNight.NoActionBar"
                android:hardwareAccelerated="true">
                
                <activity android:name="com.fastchat.recorder.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service 
                    android:name="com.fastchat.recorder.RecordService"
                    android:foregroundServiceType="mediaProjection"
                    android:exported="false" />

            </application>
        </manifest>
        EOF

        # 5. UI Layout (activity_main.xml)
        cat << 'EOF' > src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0f172a"
            android:padding="24dp">

            <TextView
                android:id="@+id/txt_title"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🎥 PlayRecorder Pro"
                android:textColor="#f8fafc"
                android:textSize="26sp"
                android:textStyle="bold"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="20dp"/>

            <TextView
                android:id="@+id/txt_status"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Status: Ready"
                android:textColor="#38bdf8"
                android:textSize="14sp"
                android:layout_below="@id/txt_title"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="8dp"/>

            <ScrollView
                android:layout_width="match_parent"
                android:layout_height="100dp"
                android:layout_above="@+id/btn_action"
                android:layout_marginBottom="20dp"
                android:background="#1e293b"
                android:padding="10dp">
                <TextView
                    android:id="@+id/txt_debug"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="Debug Engine Active: No errors detected."
                    android:textColor="#ef4444"
                    android:textSize="12sp"
                    android:fontFamily="monospace"/>
            </ScrollView>

            <com.google.android.material.button.MaterialButton
                android:id="@+id/btn_action"
                android:layout_width="160dp"
                android:layout_height="160dp"
                android:layout_centerInParent="true"
                android:text="START"
                android:textSize="20sp"
                android:textStyle="bold"
                android:textColor="#ffffff"
                android:backgroundTint="#ef4444"
                android:insetTop="0dp"
                android:insetBottom="0dp"
                android:gravity="center" />

        </RelativeLayout>
        EOF

        # 6. RecordService.java (With Strict Try-Catch Exception Logger)
        cat << 'EOF' > src/main/java/com/fastchat/recorder/RecordService.java
        package com.fastchat.recorder;

        import android.app.Notification;
        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.app.Service;
        import android.content.Context;
        import android.content.Intent;
        import android.content.pm.ServiceInfo;
        import android.hardware.display.DisplayManager;
        import android.hardware.display.VirtualDisplay;
        import android.media.MediaRecorder;
        import android.media.projection.MediaProjection;
        import android.media.projection.MediaProjectionManager;
        import android.os.Build;
        import android.os.IBinder;
        import android.util.DisplayMetrics;
        import android.view.WindowManager;
        import androidx.core.app.NotificationCompat;
        import java.io.File;

        public class RecordService extends Service {
            private static final String CHANNEL_ID = "RecorderChannel";
            public static int resultCode;
            public static Intent resultData;
            public static String lastError = "";
            
            private MediaProjection mediaProjection;
            private MediaRecorder mediaRecorder;
            private VirtualDisplay virtualDisplay;

            @Override
            public IBinder onBind(Intent intent) { return null; }

            @Override
            public void onCreate() {
                super.onCreate();
                try {
                    createNotificationChannel();
                    Notification notification = new NotificationCompat.Builder(this, CHANNEL_ID)
                            .setContentTitle("Screen Recorder Active")
                            .setContentText("Engine running...")
                            .setSmallIcon(android.R.drawable.presence_video_online)
                            .build();

                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                        startForeground(101, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PROJECTION);
                    } else {
                        startForeground(101, notification);
                    }
                } catch (Exception e) {
                    lastError = "Service onCreate Error: " + e.getMessage();
                }
            }

            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                if (resultData != null) {
                    try {
                        MediaProjectionManager mpManager = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);
                        if (mpManager != null) {
                            mediaProjection = mpManager.getMediaProjection(resultCode, resultData);
                            if (mediaProjection != null) {
                                setupRecorder();
                                startRecording();
                            } else {
                                lastError = "MediaProjection is NULL";
                            }
                        }
                    } catch (Exception e) {
                        lastError = "StartCommand Error: " + e.toString();
                    }
                }
                return START_NOT_STICKY;
            }

            private void setupRecorder() {
                try {
                    mediaRecorder = new MediaRecorder();
                    mediaRecorder.setAudioSource(MediaRecorder.AudioSource.MIC);
                    mediaRecorder.setVideoSource(MediaRecorder.VideoSource.SURFACE);
                    mediaRecorder.setOutputFormat(MediaRecorder.OutputFormat.MPEG_4);

                    File file = new File(getExternalFilesDir(null), "Record_" + System.currentTimeMillis() + ".mp4");
                    mediaRecorder.setOutputFile(file.getAbsolutePath());
                    
                    mediaRecorder.setVideoSize(1280, 720);
                    mediaRecorder.setVideoEncoder(MediaRecorder.VideoEncoder.H264);
                    mediaRecorder.setAudioEncoder(MediaRecorder.AudioEncoder.AAC);
                    mediaRecorder.setVideoEncodingBitRate(2500000);
                    mediaRecorder.setVideoFrameRate(25);

                    mediaRecorder.prepare();
                } catch (Exception e) {
                    lastError = "SetupRecorder Error: " + e.toString();
                }
            }

            private void startRecording() {
                try {
                    WindowManager windowManager = (WindowManager) getSystemService(Context.WINDOW_SERVICE);
                    DisplayMetrics metrics = new DisplayMetrics();
                    if (windowManager != null && mediaProjection != null) {
                        windowManager.getDefaultDisplay().getMetrics(metrics);
                        virtualDisplay = mediaProjection.createVirtualDisplay(
                                "CaptureDisplay", 1280, 720, metrics.densityDpi,
                                DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
                                mediaRecorder.getSurface(), null, null
                        );
                        mediaRecorder.start();
                    }
                } catch (Exception e) {
                    lastError = "StartRecording Error: " + e.toString();
                }
            }

            private void createNotificationChannel() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    NotificationChannel serviceChannel = new NotificationChannel(
                            CHANNEL_ID, "Screen Recorder Channel",
                            NotificationManager.IMPORTANCE_HIGH
                    );
                    NotificationManager manager = getSystemService(NotificationManager.class);
                    if (manager != null) manager.createNotificationChannel(serviceChannel);
                }
            }

            @Override
            public void onDestroy() {
                super.onDestroy();
                try {
                    if (mediaRecorder != null) {
                        mediaRecorder.stop();
                        mediaRecorder.reset();
                        mediaRecorder.release();
                    }
                    if (virtualDisplay != null) virtualDisplay.release();
                    if (mediaProjection != null) mediaProjection.stop();
                } catch (Exception e) {
                    e.printStackTrace();
                }
            }
        }
        EOF

        # 7. MainActivity.java (With Realtime Crash Logger UI Interface)
        cat << 'EOF' > src/main/java/com/fastchat/recorder/MainActivity.java
        package com.fastchat.recorder;

        import android.Manifest;
        import android.content.Context;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.media.projection.MediaProjectionManager;
        import android.os.Build;
        import android.os.Bundle;
        import android.os.Handler;
        import android.os.Looper;
        import android.view.View;
        import android.widget.TextView;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;
        import com.google.android.material.button.MaterialButton;
        import java.util.ArrayList;
        import java.util.List;

        public class MainActivity extends AppCompatActivity {
            private static final int PERMISSION_REQ_CODE = 404;
            private static final int CAPTURE_REQ_CODE = 505;
            private boolean isRecording = false;
            private MaterialButton btnAction;
            private TextView txtStatus, txtDebug;
            private MediaProjectionManager mpManager;
            private Handler debugHandler = new Handler(Looper.getMainLooper());

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                btnAction = findViewById(R.id.btn_action);
                txtStatus = findViewById(R.id.txt_status);
                txtDebug = findViewById(R.id.txt_debug);
                
                mpManager = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);

                checkPermissions();
                startDebugMonitor();

                btnAction.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        if (!isRecording) {
                            startCaptureIntent();
                        } else {
                            stopRecording();
                        }
                    }
                });
            }

            private void startDebugMonitor() {
                debugHandler.postDelayed(new Runnable() {
                    @Override
                    public void run() {
                        if (RecordService.lastError != null && !RecordService.lastError.isEmpty()) {
                            txtDebug.setText("CRASH CAPTURED:\n" + RecordService.lastError);
                        }
                        debugHandler.postDelayed(this, 1000);
                    }
                }, 1000);
            }

            private void checkPermissions() {
                List<String> permissions = new ArrayList<>();
                permissions.add(Manifest.permission.RECORD_AUDIO);
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    permissions.add(Manifest.permission.POST_NOTIFICATIONS);
                }

                List<String> needed = new ArrayList<>();
                for (String p : permissions) {
                    if (ContextCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED) {
                        needed.add(p);
                    }
                }
                if (!needed.isEmpty()) {
                    ActivityCompat.requestPermissions(this, needed.toArray(new String[0]), PERMISSION_REQ_CODE);
                }
            }

            private void startCaptureIntent() {
                try {
                    if (mpManager != null) {
                        startActivityForResult(mpManager.createScreenCaptureIntent(), CAPTURE_REQ_CODE);
                    }
                } catch (Exception e) {
                    txtDebug.setText("Intent Error: " + e.getMessage());
                }
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == CAPTURE_REQ_CODE && resultCode == RESULT_OK && data != null) {
                    try {
                        RecordService.resultCode = resultCode;
                        RecordService.resultData = data;

                        Intent intent = new Intent(this, RecordService.class);
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                            startForegroundService(intent);
                        } else {
                            startService(intent);
                        }

                        isRecording = true;
                        btnAction.setText("STOP");
                        btnAction.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xFF22C55E));
                        txtStatus.setText("Status: Recording Active 🟢");
                    } catch (Exception e) {
                        txtDebug.setText("onActivityResult Service Error: " + e.getMessage());
                    }
                }
            }

            private void stopRecording() {
                Intent intent = new Intent(this, RecordService.class);
                stopService(intent);
                
                isRecording = false;
                btnAction.setText("START");
                btnAction.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xFFEF4444));
                txtStatus.setText("Status: Video Saved!");
            }
        }
        EOF

        # 8. Standard Resource Values
        cat << 'EOF' > src/main/res/values/strings.xml
        <resources><string name="app_name">PlayRecorder Pro</string></resources>
        EOF

    - name: 🏗️ Create Gradle Wrapper & Run Build
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 🔍 Locate and Stage APK
      run: |
        mkdir -p final-apk/
        find . -name "*.apk" -exec cp {} final-apk/play-recorder.apk \;
        ls -la final-apk/

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Play-Screen-Recorder
        path: final-apk/play-recorder.apk
