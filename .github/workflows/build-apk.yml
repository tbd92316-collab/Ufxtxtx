name: Build Custom Image Keyboard

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Keyboard Service
      run: |
        mkdir -p app/src/main/java/com/fastchat/keyboard/
        cat << 'EOF' > app/src/main/java/com/fastchat/keyboard/ImageKeyboardService.java
        package com.fastchat.keyboard;
        import android.inputmethodservice.InputMethodService;
        import android.view.View;
        import android.view.inputmethod.InputConnection;
        import android.widget.Button;
        import android.util.Base64;
        import android.graphics.Bitmap;
        import java.io.ByteArrayOutputStream;

        public class ImageKeyboardService extends InputMethodService {
            @Override
            public View onCreateInputView() {
                View view = getLayoutInflater().inflate(R.layout.keyboard_view, null);
                Button btnSendImg = view.findViewById(R.id.btnSendImg);
                
                btnSendImg.setOnClickListener(v -> {
                    // Yaha user gallery se photo select karega
                    // Bitmap bitmap = selectFromGallery();
                    // String base64 = convertToBase64(bitmap);
                    // getCurrentInputConnection().commitText(base64, 1);
                });
                return view;
            }
        }
        EOF

    - name: 📱 Create Keyboard UI
      run: |
        mkdir -p app/src/main/res/layout/
        cat << 'EOF' > app/src/main/res/layout/keyboard_view.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="250dp"
            android:orientation="horizontal" android:gravity="center">
            <Button android:id="@+id/btnSendImg" android:layout_width="wrap_content" 
                    android:layout_height="wrap_content" android:text="🖼️ Insert Photo"/>
        </LinearLayout>
        EOF

    - name: 🔑 Android Manifest with Keyboard Service
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <application>
                <service android:name=".ImageKeyboardService"
                    android:permission="android.permission.BIND_INPUT_METHOD"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.view.InputMethod" />
                    </intent-filter>
                    <meta-data android:name="android.view.im" android:resource="@xml/method" />
                </service>
            </application>
        </manifest>
        EOF

    - name: 🏗️ Build APK
      run: |
        # Gradle settings...
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Image-Keyboard
        path: app/build/outputs/apk/debug/app-debug.apk
