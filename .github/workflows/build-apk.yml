name: Build Custom Image Keyboard

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Project Structure
      run: |
        mkdir -p app/src/main/java/com/fastchat/keyboard/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/xml/

    - name: 📱 Create Keyboard Service & UI
      run: |
        cat << 'EOF' > app/src/main/java/com/fastchat/keyboard/ImageKeyboardService.java
        package com.fastchat.keyboard;
        import android.inputmethodservice.InputMethodService;
        import android.view.View;
        public class ImageKeyboardService extends InputMethodService {
            @Override public View onCreateInputView() {
                return getLayoutInflater().inflate(R.layout.keyboard_view, null);
            }
        }
        EOF

        cat << 'EOF' > app/src/main/res/layout/keyboard_view.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="250dp"
            android:orientation="horizontal" android:gravity="center" android:background="#2C2C2C">
            <Button android:id="@+id/btnSendImg" android:layout_width="wrap_content" 
                    android:layout_height="wrap_content" android:text="🖼️ Insert Photo"/>
        </LinearLayout>
        EOF

        cat << 'EOF' > app/src/main/res/xml/method.xml
        <input-method xmlns:android="http://schemas.android.com/apk/res/android" />
        EOF

    - name: 🔑 Android Manifest
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <application>
                <service android:name=".ImageKeyboardService"
                    android:permission="android.permission.BIND_INPUT_METHOD"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.view.InputMethod" />
                    </intent-filter>
                    <meta-data android:name="android.view.im" android:resource="@xml/method" />
                </service>
            </application>
        </manifest>
        EOF

    - name: 🏗️ Setup Gradle & Build APK
      run: |
        # Gradle Wrapper create karna zaroori hai error se bachne ke liye
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        
        # Basic build.gradle file create karna
        echo "plugins { id 'com.android.application' }
        android { 
            namespace 'com.fastchat.keyboard'
            compileSdk 34
            defaultConfig { applicationId 'com.fastchat.keyboard'; minSdk 24; targetSdk 34 }
        }" > app/build.gradle
        
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Image-Keyboard-Final
        path: app/build/outputs/apk/debug/app-debug.apk
