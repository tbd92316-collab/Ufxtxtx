name: Build Battery and Temp Monitor APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p BatteryApp/app/src/main/java/com/example/batteryapp
          mkdir -p BatteryApp/app/src/main/res/layout
          mkdir -p BatteryApp/app/src/main/res/values

      - name: Write Configuration Files
        run: |
          cat > BatteryApp/settings.gradle << 'EOF'
          rootProject.name = "BatteryTempMonitor"
          include ':app'
          EOF
          
          cat > BatteryApp/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          EOF

      - name: Write app/build.gradle
        run: |
          cat > BatteryApp/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.batteryapp'
              compileSdk 34
              defaultConfig { applicationId "com.example.batteryapp"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          EOF

      # Yahan hum officially wrapper setup kar rahe hain bina temp folders ke
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        working-directory: ./BatteryApp
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Battery-Temp-Monitor-APK
          path: BatteryApp/app/build/outputs/apk/debug/app-debug.apk
