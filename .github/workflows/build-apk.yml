name: Build Advanced Screen Recorder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure & Permissions
      run: |
        mkdir -p src/main/java/com/fastchat/recorder/
        mkdir -p src/main/res/layout/
        mkdir -p src/main/res/values/
        mkdir -p src/main/assets/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "AdvancedRecorder"
        EOF

        # 3. Build.gradle (Stable Target Configurations)
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2'
        }

        android {
            namespace 'com.fastchat.recorder'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.recorder'
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 4. AndroidManifest.xml (Proper Foreground Service Types Declarations)
        cat << 'EOF' > src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />

            <application
                android:label="🛡️ Ultra Recorder Pro"
                android:theme="@style/Theme.AppCompat.DayNight.NoActionBar"
                android:hardwareAccelerated="true">
                
                <activity android:name="com.fastchat.recorder.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service 
                    android:name="com.fastchat.recorder.RecordService"
                    android:foregroundServiceType="mediaProjection"
                    android:exported="false" />

            </application>
        </manifest>
        EOF

        # 5. UI Layout (Simple Android layout config)
        cat << 'EOF' > src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0f172a"
            android:padding="24dp">

            <TextView
                android:id="@+id/txt_title"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🛡️ Ultra Recorder Pro"
                android:textColor="#f8fafc"
                android:textSize="26sp"
                android:textStyle="bold"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="20dp"/>

            <TextView
                android:id="@+id/txt_status"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Status: Ready to Record"
                android:textColor="#38bdf8"
                android:textSize="16sp"
                android:layout_below="@id/txt_title"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="8dp"/>

            <LinearLayout
                android:id="@+id/info_box"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:background="#1e293b"
                android:padding="16dp"
                android:layout_below="@id/txt_status"
                android:layout_marginTop="40dp">

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="⚡ Anti-Restriction Engine Active"
                    android:textColor="#22c55e"
                    android:textStyle="bold"
                    android:textSize="15sp"/>

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="If premium streaming apps show black screen due to OS constraints, enable 'Disable HW Overlays' in developer options to force hardware layer capturing."
                    android:textColor="#94a3b8"
                    android:textSize="13sp"
                    android:layout_marginTop="6dp"/>
            </LinearLayout>

            <com.google.android.material.button.MaterialButton
                android:id="@+id/btn_action"
                android:layout_width="200dp"
                android:layout_height="200dp"
                android:layout_centerInParent="true"
                android:text="START\nRECORDING"
                android:textSize="18sp"
                android:textStyle="bold"
                android:textColor="#ffffff"
                android:backgroundTint="#ef4444"
                android:insetTop="0dp"
                android:insetBottom="0dp"
                android:gravity="center" />

        </RelativeLayout>
        EOF

        # 6. RecordService.java (CRASH FIX: Instant notification deployment inside onCreate)
        cat << 'EOF' > src/main/java/com/fastchat/recorder/RecordService.java
        package com.fastchat.recorder;

        import android.app.Notification;
        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.app.Service;
        import android.content.Context;
        import android.content.Intent;
        import android.content.pm.ServiceInfo;
        import android.hardware.display.DisplayManager;
        import android.hardware.display.VirtualDisplay;
        import android.media.MediaRecorder;
        import android.media.projection.MediaProjection;
        import android.media.projection.MediaProjectionManager;
        import android.os.Build;
        import android.os.IBinder;
        import android.util.DisplayMetrics;
        import android.view.WindowManager;
        import androidx.core.app.NotificationCompat;
        import java.io.File;
        import java.io.IOException;

        public class RecordService extends Service {
            private static final String CHANNEL_ID = "RecorderChannel";
            private MediaProjection mediaProjection;
            private MediaRecorder mediaRecorder;
            private VirtualDisplay virtualDisplay;

            @Override
            public IBinder onBind(Intent intent) { return null; }

            @Override
            public void onCreate() {
                super.onCreate();
                createNotificationChannel();
                
                Notification notification = new NotificationCompat.Builder(this, CHANNEL_ID)
                        .setContentTitle("Ultra Recorder Running")
                        .setContentText("Bypass screen processing active...")
                        .setSmallIcon(android.R.drawable.presence_video_online)
                        .setPriority(NotificationCompat.PRIORITY_MAX)
                        .build();

                // CRASH FIX: Immediate foreground attachment with explicit target service types
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                    startForeground(101, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PROJECTION);
                } else {
                    startForeground(101, notification);
                }
            }

            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                if (intent == null) return START_NOT_STICKY;
                
                int resultCode = intent.getIntExtra("resultCode", -1);
                Intent data = intent.getParcelableExtra("data");

                if (resultCode != -1 && data != null) {
                    MediaProjectionManager mpManager = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);
                    if (mpManager != null) {
                        mediaProjection = mpManager.getMediaProjection(resultCode, data);
                        setupRecorder();
                        startRecording();
                    }
                }
                return START_NOT_STICKY;
            }

            private void setupRecorder() {
                mediaRecorder = new MediaRecorder();
                mediaRecorder.setAudioSource(MediaRecorder.AudioSource.MIC);
                mediaRecorder.setVideoSource(MediaRecorder.VideoSource.SURFACE);
                mediaRecorder.setOutputFormat(MediaRecorder.OutputFormat.MPEG_4);

                File file = new File(getExternalFilesDir(null), "Screen_Record_" + System.currentTimeMillis() + ".mp4");
                mediaRecorder.setOutputFile(file.getAbsolutePath());
                
                mediaRecorder.setVideoSize(1280, 720);
                mediaRecorder.setVideoEncoder(MediaRecorder.VideoEncoder.H264);
                mediaRecorder.setAudioEncoder(MediaRecorder.AudioEncoder.AAC);
                mediaRecorder.setVideoEncodingBitRate(6000000);
                mediaRecorder.setVideoFrameRate(30);

                try {
                    mediaRecorder.prepare();
                } catch (IOException e) {
                    e.printStackTrace();
                }
            }

            private void startRecording() {
                WindowManager windowManager = (WindowManager) getSystemService(Context.WINDOW_SERVICE);
                DisplayMetrics metrics = new DisplayMetrics();
                if (windowManager != null) {
                    windowManager.getDefaultDisplay().getMetrics(metrics);
                    virtualDisplay = mediaProjection.createVirtualDisplay(
                            "BypassDisplay", 1280, 720, metrics.densityDpi,
                            DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
                            mediaRecorder.getSurface(), null, null
                    );
                    try {
                        mediaRecorder.start();
                    } catch (Exception e) {
                        e.printStackTrace();
                    }
                }
            }

            private void createNotificationChannel() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    NotificationChannel serviceChannel = new NotificationChannel(
                            CHANNEL_ID, "Screen Recorder Channel",
                            NotificationManager.IMPORTANCE_HIGH
                    );
                    NotificationManager manager = getSystemService(NotificationManager.class);
                    if (manager != null) manager.createNotificationChannel(serviceChannel);
                }
            }

            @Override
            public void onDestroy() {
                super.onDestroy();
                try {
                    if (mediaRecorder != null) {
                        mediaRecorder.stop();
                        mediaRecorder.reset();
                        mediaRecorder.release();
                    }
                    if (virtualDisplay != null) virtualDisplay.release();
                    if (mediaProjection != null) mediaProjection.stop();
                } catch (Exception e) {
                    e.printStackTrace();
                }
            }
        }
        EOF

        # 7. MainActivity.java (Permission validation logic)
        cat << 'EOF' > src/main/java/com/fastchat/recorder/MainActivity.java
        package com.fastchat.recorder;

        import android.Manifest;
        import android.content.Context;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.media.projection.MediaProjectionManager;
        import android.os.Build;
        import android.os.Bundle;
        import android.view.View;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;
        import com.google.android.material.button.MaterialButton;

        public class MainActivity extends AppCompatActivity {
            private static final int PERMISSION_REQ_CODE = 202;
            private static final int SCREEN_RECORD_REQ_CODE = 303;
            private boolean isRecording = false;
            private MaterialButton btnAction;
            private TextView txtStatus;
            private MediaProjectionManager mpManager;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                btnAction = findViewById(R.id.btn_action);
                txtStatus = findViewById(R.id.txt_status);
                mpManager = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);

                checkAndRequestPermissions();

                btnAction.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        if (!isRecording) {
                            startScreenCaptureRequest();
                        } else {
                            stopRecordingService();
                        }
                    }
                });
            }

            private void checkAndRequestPermissions() {
                if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, PERMISSION_REQ_CODE);
                }
            }

            private void startScreenCaptureRequest() {
                if (mpManager != null) {
                    startActivityForResult(mpManager.createScreenCaptureIntent(), SCREEN_RECORD_REQ_CODE);
                }
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, requestCode, data);
                if (requestCode == SCREEN_RECORD_REQ_CODE && resultCode == RESULT_OK && data != null) {
                    Intent serviceIntent = new Intent(this, RecordService.class);
                    serviceIntent.putExtra("resultCode", resultCode);
                    serviceIntent.putExtra("data", data);
                    
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                        startForegroundService(serviceIntent);
                    } else {
                        startService(serviceIntent);
                    }

                    isRecording = true;
                    btnAction.setText("STOP\nRECORDING");
                    btnAction.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xFF22C55E));
                    txtStatus.setText("Status: Recording Active 🟢");
                } else {
                    Toast.makeText(this, "Permission denied by user", Toast.LENGTH_SHORT).show();
                }
            }

            private void stopRecordingService() {
                Intent serviceIntent = new Intent(this, RecordService.class);
                stopService(serviceIntent);
                
                isRecording = false;
                btnAction.setText("START\nRECORDING");
                btnAction.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xFFEF4444));
                txtStatus.setText("Status: Recording Saved Successfully");
                Toast.makeText(this, "File saved to app directory!", Toast.LENGTH_SHORT).show();
            }
        }
        EOF

        # 8. Resources Setup
        cat << 'EOF' > src/main/res/values/strings.xml
        <resources><string name="app_name">Ultra Recorder Pro</string></resources>
        EOF

    - name: 🏗️ Create Gradle Wrapper & Run Build
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 🔍 Locate and Stage APK
      run: |
        mkdir -p final-apk/
        find . -name "*.apk" -exec cp {} final-apk/advanced-recorder.apk \;
        ls -la final-apk/

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Advanced-Screen-Recorder
        path: final-apk/advanced-recorder.apk
