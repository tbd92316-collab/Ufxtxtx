name: Create and Build Custom AdBlocker APK

on:
  workflow_dispatch: # GitHub dashboard par click karte hi chalega

jobs:
  build-from-scratch:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize Empty Directory
        run: |
          mkdir -p my-adblocker-app/app/src/main/java/com/my/adblocker
          mkdir -p my-adblocker-app/app/src/main/res/values
          cd my-adblocker-app

      - name: Create Settings Gradle
        run: |
          cat << 'EOF' > my-adblocker-app/settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "CustomAdBlocker"
          include ':app'
          EOF

      - name: Create Project Build Gradle
        run: |
          cat << 'EOF' > my-adblocker-app/build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

      - name: Create App Module Build Gradle
        run: |
          cat << 'EOF' > my-adblocker-app/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.my.adblocker'
              compileSdk 34
              defaultConfig {
                  applicationId "com.my.adblocker"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create Android Manifest
        run: |
          cat << 'EOF' > my-adblocker-app/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application
                  android:allowBackup="true"
                  android:label="My AdBlocker VPN"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".LocalVpnService"
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.net.VpnService" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Create LocalVpnService (Core VPN Engine)
        run: |
          cat << 'EOF' > my-adblocker-app/app/src/main/java/com/my/adblocker/LocalVpnService.java
          package com.my.adblocker;

          import android.content.Intent;
          import android.net.VpnService;
          import android.os.ParcelFileDescriptor;
          import android.util.Log;
          import java.io.IOException;

          public class LocalVpnService extends VpnService implements Runnable {
              private Thread mThread;
              private ParcelFileDescriptor mInterface;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (mThread != null) { mThread.interrupt(); }
                  mThread = new Thread(this, "LocalVpnThread");
                  mThread.start();
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  if (mThread != null) { mThread.interrupt(); }
                  closeInterface();
                  super.onDestroy();
              }

              @Override
              public void run() {
                  try {
                      Builder builder = new Builder();
                      builder.setSession("MyAdBlocker")
                             .addAddress("10.0.0.1", 24)
                             .addRoute("0.0.0.0", 0);
                      
                      builder.addDnsServer("94.140.14.14");
                      builder.addDnsServer("94.140.15.15");

                      mInterface = builder.establish();
                      while (!Thread.interrupted()) {
                          Thread.sleep(2000);
                      }
                  } catch (Exception e) {
                      Log.e("VPN", "Error", e);
                  } finally {
                      closeInterface();
                  }
              }

              private void closeInterface() {
                  try {
                      if (mInterface != null) { mInterface.close(); mInterface = null; }
                  } catch (IOException e) {
                      Log.e("VPN", "Close Error", e);
                  }
              }
          }
          EOF

      - name: Create MainActivity UI Code
        run: |
          cat << 'EOF' > my-adblocker-app/app/src/main/java/com/my/adblocker/MainActivity.java
          package com.my.adblocker;

          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private static final int VPN_REQUEST_CODE = 100;
              private boolean isRunning = false;
              private Button btn;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  btn = new Button(this);
                  btn.setText("Activate Ad-Blocker");
                  btn.setTextSize(22);
                  setContentView(btn);

                  btn.setOnClickListener(v -> {
                      if (!isRunning) {
                          Intent intent = VpnService.prepare(MainActivity.this);
                          if (intent != null) {
                              startActivityForResult(intent, VPN_REQUEST_CODE);
                          } else {
                              startVpn();
                          }
                      } else {
                          stopVpn();
                      }
                  });
              }

              private void startVpn() {
                  startService(new Intent(this, LocalVpnService.class));
                  btn.setText("Ad-Blocker Active (Click to Stop)");
                  isRunning = true;
                  Toast.makeText(this, "VPN Ad-Blocker Started!", Toast.LENGTH_SHORT).show();
              }

              private void stopVpn() {
                  stopService(new Intent(this, LocalVpnService.class));
                  btn.setText("Activate Ad-Blocker");
                  isRunning = false;
                  Toast.makeText(this, "VPN Ad-Blocker Stopped!", Toast.LENGTH_SHORT).show();
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == VPN_REQUEST_CODE && resultCode == RESULT_OK) {
                      startVpn();
                  }
              }
          }
          EOF

      - name: Setup Setup-Java with Gradle Built-in
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up specific Gradle Wrapper version
        run: |
          cd my-adblocker-app
          # Is baar hum proper wrapper file setup kar rahe hain taaki naye gradle se conflict na ho
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          mv gradle-8.2/bin/gradle ./gradle
          chmod +x ./gradle
          ./gradle wrapper --gradle-version 8.2 --distribution-type bin

      - name: Build Custom AdBlocker APK
        run: |
          cd my-adblocker-app
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Built APK File
        uses: actions/upload-artifact@v4
        with:
          name: Custom-AdBlocker-VPN-APK
          path: my-adblocker-app/app/build/outputs/apk/debug/*.apk
