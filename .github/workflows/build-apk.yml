name: Build Full Keyboard App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Filesystem
      run: |
        # Folder structure create karna
        mkdir -p app/src/main/java/com/fastchat/keyboard/
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/xml/

        # 1. Settings.gradle (Root)
        echo "include ':app'" > settings.gradle

        # 2. Main Manifest
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.fastchat.keyboard">
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <application android:label="Image Keyboard">
                <service android:name=".ImageKeyboardService" android:permission="android.permission.BIND_INPUT_METHOD" android:exported="true">
                    <intent-filter>
                        <action android:name="android.view.InputMethod" />
                    </intent-filter>
                    <meta-data android:name="android.view.im" android:resource="@xml/method" />
                </service>
            </application>
        </manifest>
        EOF

        # 3. Service Logic
        cat << 'EOF' > app/src/main/java/com/fastchat/keyboard/ImageKeyboardService.java
        package com.fastchat.keyboard;
        import android.inputmethodservice.InputMethodService;
        import android.view.View;
        public class ImageKeyboardService extends InputMethodService {
            @Override public View onCreateInputView() {
                return getLayoutInflater().inflate(R.layout.keyboard_view, null);
            }
        }
        EOF

        # 4. Keyboard UI
        echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="250dp" android:orientation="vertical" android:background="#FFFFFF"><Button android:id="@+id/btn" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Select Photo" /></LinearLayout>' > app/src/main/res/layout/keyboard_view.xml
        echo '<input-method xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/method.xml

        # 5. Build Gradle
        echo "plugins { id 'com.android.application' }
        android { namespace 'com.fastchat.keyboard'; compileSdk 34; defaultConfig { applicationId 'com.fastchat.keyboard'; minSdk 24; targetSdk 34 } }" > app/build.gradle

    - name: 🏗️ Build APK
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Final-Image-Keyboard
        path: app/build/outputs/apk/debug/app-debug.apk
