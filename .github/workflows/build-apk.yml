                <com.google.android.material.floatingactionbutton.ExtendedFloatingActionButton
                    android:id="@+id/btnTestNotification"
                    android:layout_width="wrap_content" android:layout_height="wrap_content"
                    android:text="Test Notification" android:textColor="#000000"
                    app:icon="@android:drawable/ic_popup_reminder" app:iconTint="#000000"
                    android:layout_alignParentBottom="true" android:layout_centerHorizontal="true"
                    android:layout_marginBottom="24dp" app:backgroundTint="@color/accent"/>
            </RelativeLayout>
        </LinearLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/item_user.xml
        <?xml version="1.0" encoding="utf-8"?>
        <com.google.android.material.card.MaterialCardView xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            android:layout_width="match_parent" android:layout_height="wrap_content"
            android:layout_marginHorizontal="8dp" android:layout_marginVertical="6dp"
            app:cardBackgroundColor="@color/surface_dark" app:cardCornerRadius="16dp" app:cardElevation="0dp">
            
            <RelativeLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="16dp">
                <ImageView android:id="@+id/ivAvatar" android:layout_width="48dp" android:layout_height="48dp" android:src="@android:drawable/sym_def_app_icon" android:background="@drawable/status_offline" android:padding="2dp"/>
                <ImageView android:id="@+id/ivStatusDot" android:layout_width="14dp" android:layout_height="14dp" android:src="@drawable/status_online" android:layout_alignBottom="@id/ivAvatar" android:layout_alignEnd="@id/ivAvatar"/>
                
                <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_toEndOf="@id/ivAvatar" android:layout_marginStart="16dp" android:layout_centerVertical="true">
                    <TextView android:id="@+id/tvUserName" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="User Name" android:textColor="@color/text_white" android:textSize="18sp" android:textStyle="bold"/>
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Tap to chat..." android:textColor="@color/text_gray" android:textSize="14sp"/>
                </LinearLayout>
            </RelativeLayout>
        </com.google.android.material.card.MaterialCardView>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_chat.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:background="@color/bg_dark">
            <com.google.android.material.appbar.AppBarLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                <androidx.appcompat.widget.Toolbar android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="?attr/actionBarSize" android:background="@color/surface_dark" app:titleTextColor="@color/text_white"/>
            </com.google.android.material.appbar.AppBarLayout>
            <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                <androidx.recyclerview.widget.RecyclerView android:id="@+id/rvMessages" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_above="@+id/layoutInput"/>
                <LinearLayout android:id="@+id/layoutInput" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_alignParentBottom="true" android:background="@color/surface_dark" android:padding="12dp" android:gravity="center_vertical">
                    <ImageButton android:layout_width="40dp" android:layout_height="40dp" android:src="@android:drawable/ic_menu_gallery" android:background="?android:attr/selectableItemBackground" app:tint="@color/text_gray"/>
                    <EditText android:layout_width="0dp" android:layout_height="45dp" android:layout_weight="1" android:hint="Message" android:textColor="@color/text_white" android:textColorHint="@color/text_gray" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginHorizontal="8dp"/>
                    <com.google.android.material.floatingactionbutton.FloatingActionButton android:layout_width="wrap_content" android:layout_height="wrap_content" app:srcCompat="@android:drawable/ic_menu_send" app:backgroundTint="@color/accent" app:tint="#000" app:fabSize="mini" app:elevation="0dp"/>
                </LinearLayout>
            </RelativeLayout>
        </LinearLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_video_call.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
            <TextView android:layout_width="match_parent" android:layout_height="match_parent" android:text="Calling..." android:textColor="#FFFFFF" android:gravity="center" android:textSize="24sp"/>
            <com.google.android.material.card.MaterialCardView android:layout_width="100dp" android:layout_height="140dp" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="20dp" app:cardCornerRadius="12dp" app:cardBackgroundColor="#333333">
                <TextView android:layout_width="match_parent" android:layout_height="match_parent" android:text="You" android:textColor="#FFFFFF" android:gravity="center"/>
            </com.google.android.material.card.MaterialCardView>
            <com.google.android.material.floatingactionbutton.FloatingActionButton android:id="@+id/fabEndCall" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="40dp" android:src="@android:drawable/ic_menu_close_clear_cancel" app:backgroundTint="#FF3B30" app:tint="#FFFFFF" app:fabSize="normal"/>
        </RelativeLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_edit_profile.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:background="@color/bg_dark">
            <androidx.appcompat.widget.Toolbar android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="?attr/actionBarSize" android:background="@color/surface_dark" app:titleTextColor="@color/text_white"/>
            <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="center_horizontal" android:padding="32dp">
                <ImageView android:layout_width="100dp" android:layout_height="100dp" android:src="@android:drawable/ic_menu_camera" android:layout_marginBottom="32dp"/>
                <EditText android:layout_width="match_parent" android:layout_height="55dp" android:hint="Change Name" android:textColor="@color/text_white" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginBottom="16dp"/>
                <EditText android:layout_width="match_parent" android:layout_height="55dp" android:hint="Change Password" android:textColor="@color/text_white" android:inputType="textPassword" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginBottom="32dp"/>
                <Button android:layout_width="match_parent" android:layout_height="55dp" android:text="Save Changes" android:background="@drawable/btn_rounded" app:backgroundTint="@null" android:textColor="#000000"/>
            </LinearLayout>
        </LinearLayout>
        EOF

    - name: 📝 Write Java Functional Code (With Logic & Data)
      run: |
        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/LoginActivity.java
        package com.fastchat.ultimate;
        import android.content.Intent;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class LoginActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState); setContentView(R.layout.activity_login);
                findViewById(R.id.btnLogin).setOnClickListener(v -> {
                    startActivity(new Intent(this, DashboardActivity.class)); finish();
                });
                findViewById(R.id.tvRegister).setOnClickListener(v -> startActivity(new Intent(this, RegisterActivity.class)));
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/RegisterActivity.java
        package com.fastchat.ultimate;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class RegisterActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState); setContentView(R.layout.activity_register);
                findViewById(R.id.btnRegister).setOnClickListener(v -> finish());
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/UserAdapter.java
        package com.fastchat.ultimate;
        import android.content.Context;
        import android.content.Intent;
        import android.view.LayoutInflater;
        import android.view.View;
        import android.view.ViewGroup;
        import android.widget.TextView;
        import androidx.annotation.NonNull;
        import androidx.recyclerview.widget.RecyclerView;
        import java.util.List;

        public class UserAdapter extends RecyclerView.Adapter<UserAdapter.ViewHolder> {
            private List<String> users;
            private Context context;

            public UserAdapter(List<String> users, Context context) { this.users = users; this.context = context; }

            @NonNull @Override public ViewHolder onCreateViewHolder(@NonNull ViewGroup parent, int viewType) {
                View view = LayoutInflater.from(context).inflate(R.layout.item_user, parent, false);
                return new ViewHolder(view);
            }

            @Override public void onBindViewHolder(@NonNull ViewHolder holder, int position) {
                holder.tvName.setText(users.get(position));
                holder.itemView.setOnClickListener(v -> {
                    Intent i = new Intent(context, ChatActivity.class);
                    i.putExtra("name", users.get(position));
                    context.startActivity(i);
                });
            }

            @Override public int getItemCount() { return users.size(); }
            
            public static class ViewHolder extends RecyclerView.ViewHolder {
                TextView tvName;
                public ViewHolder(@NonNull View itemView) {
                    super(itemView);
                    tvName = itemView.findViewById(R.id.tvUserName);
                }
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/DashboardActivity.java
        package com.fastchat.ultimate;
        import android.Manifest;
        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.app.PendingIntent;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.os.Build;
        import android.os.Bundle;
        import android.view.Menu;
        import android.view.MenuItem;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.appcompat.widget.Toolbar;
        import androidx.core.app.ActivityCompat;
        import androidx.core.app.NotificationCompat;
        import androidx.core.content.ContextCompat;
        import androidx.recyclerview.widget.LinearLayoutManager;
        import androidx.recyclerview.widget.RecyclerView;
        import java.util.Arrays;
        import java.util.List;

        public class DashboardActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState); setContentView(R.layout.activity_dashboard);
                
                Toolbar toolbar = findViewById(R.id.toolbar);
                toolbar.setTitle("Fast Chat");
                setSupportActionBar(toolbar);

                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.POST_NOTIFICATIONS}, 101);
                    }
                }

                RecyclerView rv = findViewById(R.id.rvUsers);
                rv.setLayoutManager(new LinearLayoutManager(this));
                List<String> userList = Arrays.asList("Ganesh", "Diku", "Sonu", "Sraban");
                rv.setAdapter(new UserAdapter(userList, this));

                findViewById(R.id.btnTestNotification).setOnClickListener(v -> triggerCallNotification());
            }

            @Override public boolean onCreateOptionsMenu(Menu menu) {
                getMenuInflater().inflate(R.menu.dashboard_menu, menu); return true;
            }

            @Override public boolean onOptionsItemSelected(MenuItem item) {
                int id = item.getItemId();
                if (id == R.id.menu_edit_profile) { startActivity(new Intent(this, EditProfileActivity.class)); return true; }
                else if (id == R.id.menu_dark_mode) { Toast.makeText(this, "Dark Mode Active", Toast.LENGTH_SHORT).show(); return true; }
                else if (id == R.id.menu_delete_account) { startActivity(new Intent(this, LoginActivity.class)); finish(); return true; }
                return super.onOptionsItemSelected(item);
            }

            private void triggerCallNotification() {
                NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    NotificationChannel channel = new NotificationChannel("call_channel", "Video Calls", NotificationManager.IMPORTANCE_HIGH);
                    nm.createNotificationChannel(channel);
                }
                Intent ansIntent = new Intent(this, VideoCallActivity.class);
                PendingIntent ansPending = PendingIntent.getActivity(this, 0, ansIntent, PendingIntent.FLAG_IMMUTABLE);
                Intent decIntent = new Intent(this, CallReceiver.class); decIntent.setAction("DECLINE_CALL");
                PendingIntent decPending = PendingIntent.getBroadcast(this, 1, decIntent, PendingIntent.FLAG_IMMUTABLE);

                NotificationCompat.Builder b = new NotificationCompat.Builder(this, "call_channel")
                        .setSmallIcon(android.R.drawable.ic_menu_camera).setContentTitle("Incoming Video Call")
                        .setContentText("A friend is calling you...").setPriority(NotificationCompat.PRIORITY_HIGH)
                        .setAutoCancel(true).addAction(android.R.drawable.ic_menu_call, "Answer", ansPending)
                        .addAction(android.R.drawable.ic_menu_close_clear_cancel, "Decline", decPending);
                nm.notify(101, b.build());
                Toast.makeText(this, "Check Notification Panel!", Toast.LENGTH_SHORT).show();
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/EditProfileActivity.java
        package com.fastchat.ultimate;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.appcompat.widget.Toolbar;
        public class EditProfileActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState); setContentView(R.layout.activity_edit_profile);
                Toolbar toolbar = findViewById(R.id.toolbar);
                toolbar.setTitle("Edit Profile"); setSupportActionBar(toolbar);
                getSupportActionBar().setDisplayHomeAsUpEnabled(true);
                toolbar.setNavigationOnClickListener(v -> finish());
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/ChatActivity.java
        package com.fastchat.ultimate;
        import android.content.Intent;
        import android.os.Bundle;
        import android.view.Menu;
        import android.view.MenuItem;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.appcompat.widget.Toolbar;

        public class ChatActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState); setContentView(R.layout.activity_chat);
                Toolbar toolbar = findViewById(R.id.toolbar);
                String name = getIntent().getStringExtra("name");
                toolbar.setTitle(name != null ? name : "Chat");
                setSupportActionBar(toolbar);
                getSupportActionBar().setDisplayHomeAsUpEnabled(true);
                toolbar.setNavigationOnClickListener(v -> finish());
            }
            @Override public boolean onCreateOptionsMenu(Menu menu) { getMenuInflater().inflate(R.menu.chat_menu, menu); return true; }
            @Override public boolean onOptionsItemSelected(MenuItem item) {
                if (item.getItemId() == R.id.menu_video_call) { startActivity(new Intent(this, VideoCallActivity.class)); return true; }
                return super.onOptionsItemSelected(item);
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/VideoCallActivity.java
        package com.fastchat.ultimate;
        import android.app.NotificationManager;
        import android.content.Context;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;
        public class VideoCallActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState); setContentView(R.layout.activity_video_call);
                NotificationManager nm = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                nm.cancel(101);
                findViewById(R.id.fabEndCall).setOnClickListener(v -> finish());
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/ultimate/CallReceiver.java
        package com.fastchat.ultimate;
        import android.app.NotificationManager;
        import android.content.BroadcastReceiver;
        import android.content.Context;
        import android.content.Intent;
        import android.widget.Toast;

        public class CallReceiver extends BroadcastReceiver {
            @Override public void onReceive(Context context, Intent intent) {
                if ("DECLINE_CALL".equals(intent.getAction())) {
                    NotificationManager nm = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                    nm.cancel(101);
                    Toast.makeText(context, "Call Declined", Toast.LENGTH_SHORT).show();
                }
            }
        }
        EOF

    - name: 📱 Write Android Manifest
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            
            <application android:label="Fast Chat" android:theme="@style/Theme.FastChat" android:icon="@android:drawable/sym_def_app_icon">
                <activity android:name="com.fastchat.ultimate.LoginActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <activity android:name="com.fastchat.ultimate.RegisterActivity" android:exported="false" />
                <activity android:name="com.fastchat.ultimate.DashboardActivity" android:exported="false" />
                <activity android:name="com.fastchat.ultimate.EditProfileActivity" android:exported="false" />
                <activity android:name="com.fastchat.ultimate.ChatActivity" android:exported="false" />
                <activity android:name="com.fastchat.ultimate.VideoCallActivity" android:exported="false" />
                
                <receiver android:name="com.fastchat.ultimate.CallReceiver" android:exported="false" />
            </application>
        </manifest>
        EOF

    - name: 🏗️ Setup Modern Build Environment
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        include ':app'
        EOF

        cat << 'EOF' > build.gradle
        plugins { id 'com.android.application' version '8.2.2' apply false }
        EOF

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        EOF

        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace "com.fastchat.ultimate"
            compileSdk 34
            defaultConfig { applicationId "com.fastchat.ultimate"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
            compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
        }
        EOF

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4

    - name: Compile and Pack
      run: ./gradlew assembleDebug --no-daemon

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: FastChat-Premium
        path: app/build/outputs/apk/debug/app-debug.apk
