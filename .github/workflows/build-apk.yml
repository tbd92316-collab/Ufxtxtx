name: Build 9D Surround Audio Mixer App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure
      run: |
        mkdir -p src/main/java/com/fastchat/audio9d/
        mkdir -p src/main/res/layout/
        mkdir -p src/main/res/values/

        # 1. Gradle Properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. Settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "Audio9DMixer"
        EOF

        # 3. Build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2'
        }

        android {
            namespace 'com.fastchat.audio9d'
            compileSdk 34
            defaultConfig {
                applicationId 'com.fastchat.audio9d'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 4. AndroidManifest.xml
        cat << 'EOF' > src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />

            <application
                android:label="🎧 9D Surround Studio"
                android:theme="@style/Theme.AppCompat.DayNight.NoActionBar"
                android:hardwareAccelerated="true">
                
                <activity android:name="com.fastchat.audio9d.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

            </application>
        </manifest>
        EOF

        # 5. UI Layout (activity_main.xml - FIXED XML Syntax & Margins)
        cat << 'EOF' > src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0b0f19"
            android:padding="20dp">

            <LinearLayout
                android:id="@+id/header_container"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:layout_alignParentTop="true"
                android:layout_marginTop="20dp">

                <TextView
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="🎧 9D Surround Studio"
                    android:textColor="#ffffff"
                    android:textSize="26sp"
                    android:textStyle="bold"
                    android:gravity="center"/>

                <TextView
                    android:id="@+id/txt_song_name"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="No Song Selected"
                    android:textColor="#38bdf8"
                    android:textSize="14sp"
                    android:gravity="center"
                    android:layout_marginTop="10dp"
                    android:singleLine="true"/>
            </LinearLayout>

            <com.google.android.material.button.MaterialButton
                android:id="@+id/btn_pick"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:layout_below="@id/header_container"
                android:layout_marginTop="25dp"
                android:text="OPEN SONG FROM STORAGE"
                android:textSize="14sp"
                android:textStyle="bold"
                android:backgroundTint="#2563eb"
                android:insetTop="0dp"
                android:insetBottom="0dp"/>

            <LinearLayout
                android:id="@+id/controls_panel"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:layout_below="@id/btn_pick"
                android:layout_marginTop="30dp">

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="🔄 9D Rotation Speed (Orbit)"
                    android:textColor="#94a3b8"
                    android:textSize="14sp"/>
                
                <com.google.android.material.slider.Slider
                    android:id="@+id/slider_speed"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:valueFrom="1"
                    android:valueTo="10"
                    android:value="4"/>

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:layout_marginTop="15dp"
                    android:text="🎚️ Stereo Spatial Depth (Surround Wide)"
                    android:textColor="#94a3b8"
                    android:textSize="14sp"/>
                
                <com.google.android.material.slider.Slider
                    android:id="@+id/slider_depth"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:valueFrom="1"
                    android:valueTo="10"
                    android:value="7"/>
            </LinearLayout>

            <LinearLayout
                android:id="@+id/actions_panel"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="horizontal"
                android:weightSum="2"
                android:layout_below="@id/controls_panel"
                android:layout_marginTop="40dp"
                android:gravity="center">

                <com.google.android.material.button.MaterialButton
                    android:id="@+id/btn_play"
                    android:layout_width="0dp"
                    android:layout_height="70dp"
                    android:layout_weight="1"
                    android:layout_marginEnd="10dp"
                    android:text="PLAY"
                    android:backgroundTint="#22c55e"
                    android:textStyle="bold"
                    android:textSize="16sp"/>

                <com.google.android.material.button.MaterialButton
                    android:id="@+id/btn_stop"
                    android:layout_width="0dp"
                    android:layout_height="70dp"
                    android:layout_weight="1"
                    android:layout_marginStart="10dp"
                    android:text="STOP"
                    android:backgroundTint="#ef4444"
                    android:textStyle="bold"
                    android:textSize="16sp"/>
            </LinearLayout>

            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_alignParentBottom="true"
                android:layout_marginBottom="10dp"
                android:text="💡 Best experienced with Headphones"
                android:textColor="#475569"
                android:textSize="12sp"
                android:gravity="center"/>

        </RelativeLayout>
        EOF

        # 6. MainActivity.java
        cat << 'EOF' > src/main/java/com/fastchat/audio9d/MainActivity.java
        package com.fastchat.audio9d;

        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.media.MediaPlayer;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.os.Handler;
        import android.os.Looper;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;
        import com.google.android.material.button.MaterialButton;
        import com.google.android.material.slider.Slider;

        public class MainActivity extends AppCompatActivity {
            private static final int REQ_PICK_AUDIO = 901;
            private static final int REQ_PERM = 902;

            private MediaPlayer mediaPlayer;
            private Handler panHandler = new Handler(Looper.getMainLooper());
            private Runnable panRunnable;

            private MaterialButton btnPick, btnPlay, btnStop;
            private TextView txtSongName;
            private Slider sliderSpeed, sliderDepth;

            private Uri audioUri = null;
            private float currentAngle = 0.0f;
            private float speedMultiplier = 0.06f;
            private float depthMultiplier = 0.7f;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                btnPick = findViewById(R.id.btn_pick);
                btnPlay = findViewById(R.id.btn_play);
                btnStop = findViewById(R.id.btn_stop);
                txtSongName = findViewById(R.id.txt_song_name);
                sliderSpeed = findViewById(R.id.slider_speed);
                sliderDepth = findViewById(R.id.slider_depth);

                checkPermissions();

                btnPick.setOnClickListener(v -> openAudioPicker());
                btnPlay.setOnClickListener(v -> start9DPlayback());
                btnStop.setOnClickListener(v -> stopPlayback());

                sliderSpeed.addOnChangeListener((slider, value, fromUser) -> speedMultiplier = value * 0.015f);
                sliderDepth.addOnChangeListener((slider, value, fromUser) -> depthMultiplier = value * 0.1f);

                setup9DEngineLoop();
            }

            private void checkPermissions() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.READ_MEDIA_AUDIO}, REQ_PERM);
                    }
                } else {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.READ_EXTERNAL_STORAGE}, REQ_PERM);
                    }
                }
            }

            private void openAudioPicker() {
                Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                intent.setType("audio/*");
                startActivityForResult(Intent.createChooser(intent, "Select Audio Song"), REQ_PICK_AUDIO);
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == REQ_PICK_AUDIO && resultCode == RESULT_OK && data != null) {
                    audioUri = data.getData();
                    txtSongName.setText("Song Selected Successfully ✅");
                    stopPlayback();
                }
            }

            private void start9DPlayback() {
                if (audioUri == null) {
                    Toast.makeText(this, "Please select a song first!", Toast.LENGTH_SHORT).show();
                    return;
                }

                if (mediaPlayer != null) {
                    mediaPlayer.start();
                    return;
                }

                try {
                    mediaPlayer = new MediaPlayer();
                    mediaPlayer.setDataSource(this, audioUri);
                    mediaPlayer.setLooping(true);
                    mediaPlayer.prepare();
                    mediaPlayer.start();
                    Toast.makeText(this, "9D Studio Panning Engaged 🎧", Toast.LENGTH_SHORT).show();
                } catch (Exception e) {
                    Toast.makeText(this, "Playback Error: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                }
            }

            private void setup9DEngineLoop() {
                panRunnable = new Runnable() {
                    @Override
                    public void run() {
                        if (mediaPlayer != null && mediaPlayer.isPlaying()) {
                            currentAngle += speedMultiplier;
                            if (currentAngle > (2 * Math.PI)) {
                                currentAngle = 0.0f;
                            }

                            float leftVolume = (float) (0.5 + (Math.sin(currentAngle) * depthMultiplier * 0.5));
                            float rightVolume = (float) (0.5 + (Math.cos(currentAngle) * depthMultiplier * 0.5));

                            if (leftVolume < 0.0f) leftVolume = 0.0f;
                            if (leftVolume > 1.0f) leftVolume = 1.0f;
                            if (rightVolume < 0.0f) rightVolume = 0.0f;
                            if (rightVolume > 1.0f) rightVolume = 1.0f;

                            mediaPlayer.setVolume(leftVolume, rightVolume);
                        }
                        panHandler.postDelayed(this, 30);
                    }
                };
                panHandler.postDelayed(panRunnable, 30);
            }

            private void stopPlayback() {
                if (mediaPlayer != null) {
                    mediaPlayer.stop();
                    mediaPlayer.release();
                    mediaPlayer = null;
                }
            }

            @Override
            protected void onDestroy() {
                stopPlayback();
                panHandler.removeCallbacks(panRunnable);
                super.onDestroy();
            }
        }
        EOF

        # 7. Strings.xml
        cat << 'EOF' > src/main/res/values/strings.xml
        <resources><string name="app_name">9D Surround Studio</string></resources>
        EOF

    - name: 🏗️ Create Gradle Wrapper & Run Build
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 🔍 Locate and Stage APK
      run: |
        mkdir -p final-apk/
        find . -name "*.apk" -exec cp {} final-apk/9d-surround-studio.apk \;
        ls -la final-apk/

    - name: Deliver APK
      uses: actions/upload-artifact@v4
      with:
        name: Audio-9D-Mixer-Pack
        path: final-apk/9d-surround-studio.apk
