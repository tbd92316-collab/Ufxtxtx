        # 100% Fixed signature layout via exact API matching overrides
        cat << 'EOF' > app/src/main/java/com/fastchat/pro/ChatRoomActivity.java
        package com.fastchat.pro;

        import android.content.Intent;
        import android.database.Cursor;
        import android.net.Uri;
        import android.os.Bundle;
        import android.provider.OpenableColumns;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.ImageButton;
        import android.widget.Toast;
        import androidx.annotation.Nullable;
        import androidx.appcompat.app.AppCompatActivity;

        public class ChatRoomActivity extends AppCompatActivity {
            private static final int IMAGE_PICK_CODE = 999;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_chat_room);

                EditText etInput = findViewById(R.id.etMessageInput);
                Button btnSend = findViewById(R.id.btnSendMessage);
                ImageButton btnAttach = findViewById(R.id.btnAttachImage);
                Button btnCall = findViewById(R.id.btnTriggerVideoCall);

                btnSend.setOnClickListener(v -> {
                    String msg = etInput.getText().toString().trim();
                    if (!msg.isEmpty()) {
                        Toast.makeText(this, "Message sent. Long press to erase.", Toast.LENGTH_SHORT).show();
                        etInput.setText("");
                    }
                });

                btnAttach.setOnClickListener(v -> {
                    Intent intent = new Intent(Intent.ACTION_PICK);
                    intent.setType("image/*");
                    startActivityForResult(intent, IMAGE_PICK_CODE);
                });

                btnCall.setOnClickListener(v -> {
                    startActivity(new Intent(this, IncomingCallActivity.class));
                });
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, @Nullable Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == IMAGE_PICK_CODE && resultCode == RESULT_OK && data != null) {
                    Uri selectedImage = data.getData();
                    if (selectedImage != null) {
                        long fileSize = 0;
                        Cursor cursor = getContentResolver().query(selectedImage, null, null, null, null);
                        if (cursor != null) {
                            int sizeIndex = cursor.getColumnIndex(OpenableColumns.SIZE);
                            cursor.moveToFirst();
                            fileSize = cursor.getLong(sizeIndex);
                            cursor.close();
                        }
                        
                        // Strict 1MB limitation checking rules
                        if (fileSize > 1024 * 1024) {
                            Toast.makeText(this, "File too large! Max limit is 1MB.", Toast.LENGTH_LONG).show();
                        } else {
                            Toast.makeText(this, "Image verified under 1MB. Ready.", Toast.LENGTH_SHORT).show();
                        }
                    }
                }
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/fastchat/pro/IncomingCallActivity.java
        package com.fastchat.pro;

        import android.os.Bundle;
        import android.widget.Button;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        public class IncomingCallActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_incoming_call);

                Button btnAnswer = findViewById(R.id.btnAnswerCall);
                Button btnDecline = findViewById(R.id.btnDeclineCall);

                btnAnswer.setOnClickListener(v -> {
                    Toast.makeText(this, "Connecting to Media Channels...", Toast.LENGTH_SHORT).show();
                    finish();
                });

                btnDecline.setOnClickListener(v -> {
                    Toast.makeText(this, "Call Terminated.", Toast.LENGTH_SHORT).show();
                    finish();
                });
            }
        }
        EOF

