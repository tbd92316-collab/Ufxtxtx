name: Build Ultimate FastChat App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: ⚙️ Setup Directory Structure
      run: |
        mkdir -p app/src/main/res/layout/
        mkdir -p app/src/main/res/values/
        mkdir -p app/src/main/res/drawable/
        mkdir -p app/src/main/res/menu/
        mkdir -p app/src/main/java/com/fastchat/ultimate/

    - name: 🎨 Create Drawables & Menus
      run: |
        cat << 'EOF' > app/src/main/res/drawable/status_online.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#00E676"/>
            <size android:width="14dp" android:height="14dp"/>
            <stroke android:width="2dp" android:color="#1E1E1E"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/status_offline.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#757575"/>
            <size android:width="14dp" android:height="14dp"/>
            <stroke android:width="2dp" android:color="#1E1E1E"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/btn_rounded.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#00E676"/>
            <corners android:radius="24dp"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/input_bg.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#2C2C2C"/>
            <corners android:radius="12dp"/>
            <stroke android:width="1dp" android:color="#444444"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/menu/dashboard_menu.xml
        <?xml version="1.0" encoding="utf-8"?>
        <menu xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto">
            <item android:id="@+id/menu_edit_profile" android:title="Edit Profile" app:showAsAction="never"/>
            <item android:id="@+id/menu_dark_mode" android:title="Dark Mode" app:showAsAction="never"/>
            <item android:id="@+id/menu_delete_account" android:title="Delete Account" app:showAsAction="never"/>
        </menu>
        EOF

        cat << 'EOF' > app/src/main/res/menu/chat_menu.xml
        <?xml version="1.0" encoding="utf-8"?>
        <menu xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto">
            <item android:id="@+id/menu_video_call" android:title="Video Call" android:icon="@android:drawable/ic_menu_camera" app:showAsAction="always"/>
        </menu>
        EOF

    - name: 🔑 App Configs & Themes
      run: |
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Fast Chat</string>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/colors.xml
        <resources>
            <color name="bg_dark">#121212</color>
            <color name="surface_dark">#1E1E1E</color>
            <color name="accent">#00E676</color>
            <color name="text_white">#FFFFFF</color>
            <color name="text_gray">#B0BEC5</color>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.FastChat" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                <item name="colorPrimary">@color/surface_dark</item>
                <item name="colorAccent">@color/accent</item>
                <item name="android:windowBackground">@color/bg_dark</item>
                <item name="android:forceDarkAllowed">false</item>
            </style>
        </resources>
        EOF

    - name: 📱 Create Premium UI Layouts
      run: |
        cat << 'EOF' > app/src/main/res/layout/activity_login.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:gravity="center" android:padding="32dp" android:background="@color/bg_dark">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Fast Chat" android:textColor="@color/accent" android:textSize="36sp" android:textStyle="bold" android:layout_marginBottom="40dp"/>
            <EditText android:id="@+id/etEmail" android:layout_width="match_parent" android:layout_height="55dp" android:hint="Gmail ID" android:textColor="@color/text_white" android:textColorHint="@color/text_gray" android:inputType="textEmailAddress" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginBottom="16dp"/>
            <EditText android:id="@+id/etPassword" android:layout_width="match_parent" android:layout_height="55dp" android:hint="Password" android:textColor="@color/text_white" android:textColorHint="@color/text_gray" android:inputType="textPassword" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginBottom="32dp"/>
            <Button android:id="@+id/btnLogin" android:layout_width="match_parent" android:layout_height="55dp" android:text="LOGIN" android:textSize="16sp" android:textStyle="bold" android:background="@drawable/btn_rounded" app:backgroundTint="@null" android:textColor="#000000" xmlns:app="http://schemas.android.com/apk/res-auto"/>
            <TextView android:id="@+id/tvRegister" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="New User? Create Account" android:textColor="@color/text_gray" android:textSize="16sp" android:layout_marginTop="24dp"/>
        </LinearLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_register.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:gravity="center" android:padding="32dp" android:background="@color/bg_dark">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="Register" android:textColor="@color/accent" android:textSize="32sp" android:textStyle="bold" android:layout_marginBottom="30dp"/>
            <EditText android:id="@+id/etName" android:layout_width="match_parent" android:layout_height="55dp" android:hint="Full Name" android:textColor="@color/text_white" android:textColorHint="@color/text_gray" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginBottom="16dp"/>
            <EditText android:id="@+id/etEmail" android:layout_width="match_parent" android:layout_height="55dp" android:hint="Gmail ID" android:textColor="@color/text_white" android:textColorHint="@color/text_gray" android:inputType="textEmailAddress" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginBottom="16dp"/>
            <EditText android:id="@+id/etPassword" android:layout_width="match_parent" android:layout_height="55dp" android:hint="Password" android:textColor="@color/text_white" android:textColorHint="@color/text_gray" android:inputType="textPassword" android:background="@drawable/input_bg" android:paddingStart="16dp" android:layout_marginBottom="32dp"/>
            <Button android:id="@+id/btnRegister" android:layout_width="match_parent" android:layout_height="55dp" android:text="SIGN UP" android:textStyle="bold" android:background="@drawable/btn_rounded" app:backgroundTint="@null" android:textColor="#000000" xmlns:app="http://schemas.android.com/apk/res-auto"/>
        </LinearLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_dashboard.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:background="@color/bg_dark">
            
